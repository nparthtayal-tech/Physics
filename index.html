<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAPHY106 — Foundations of Quantum Mechanics</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&family=IBM+Plex+Serif:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --card: #16161f;
  --border: #2a2a3a;
  --accent: #7c6aff;
  --accent2: #ff6b6b;
  --accent3: #44e5b4;
  --accent4: #ffc947;
  --text: #e8e8f0;
  --muted: #8888aa;
  --dim: #55556a;
  --glow: rgba(124,106,255,0.15);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Serif', Georgia, serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* GRID NOISE BACKGROUND */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(124,106,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,106,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.app { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 0 24px 80px; }

/* HEADER */
header {
  padding: 48px 0 40px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 48px;
}

.header-tag {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-tag::after { content: ''; flex: 1; height: 1px; background: var(--border); }

h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(32px, 5vw, 56px);
  font-weight: 800;
  line-height: 1.05;
  letter-spacing: -1.5px;
  background: linear-gradient(135deg, #fff 0%, #b8b0ff 60%, var(--accent) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.subtitle {
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  color: var(--muted);
  margin-top: 12px;
  line-height: 1.8;
}

.progress-bar-wrap { margin-top: 28px; display: flex; align-items: center; gap: 16px; }
.progress-label { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); white-space: nowrap; }
.progress-track { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent3)); border-radius: 2px; transition: width 0.6s ease; width: 0%; }
.progress-pct { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent); min-width: 36px; }

/* MODULE GRID */
.modules-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
  margin-bottom: 40px;
}

.module-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
  position: relative;
}
.module-card:hover {
  border-color: var(--accent);
  box-shadow: 0 0 32px var(--glow);
  transform: translateY(-2px);
}
.module-card.active {
  border-color: var(--accent);
  box-shadow: 0 0 40px var(--glow);
}

.module-header {
  padding: 20px 24px;
  display: flex;
  align-items: flex-start;
  gap: 16px;
}

.module-num {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  background: rgba(124,106,255,0.1);
  border: 1px solid rgba(124,106,255,0.2);
  border-radius: 6px;
  padding: 4px 10px;
  white-space: nowrap;
  margin-top: 2px;
}

.module-info { flex: 1; }

.module-title {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 6px;
}

.module-meta {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  display: flex;
  gap: 12px;
}

.module-chevron {
  width: 20px;
  height: 20px;
  color: var(--dim);
  transition: transform 0.3s, color 0.3s;
  flex-shrink: 0;
  margin-top: 2px;
}
.module-card.active .module-chevron { transform: rotate(90deg); color: var(--accent); }

.module-topics {
  display: none;
  padding: 0 24px 20px;
  border-top: 1px solid var(--border);
}
.module-card.active .module-topics { display: block; }

.topic-list { list-style: none; padding-top: 16px; }
.topic-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s;
  margin-bottom: 4px;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--muted);
}
.topic-item:hover { background: rgba(124,106,255,0.08); color: var(--text); }
.topic-item.studied { color: var(--accent3); }

.topic-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--border);
  flex-shrink: 0;
  transition: background 0.2s;
}
.topic-item:hover .topic-dot { background: var(--accent); }
.topic-item.studied .topic-dot { background: var(--accent3); }
.topic-arrow { margin-left: auto; opacity: 0; transition: opacity 0.2s; }
.topic-item:hover .topic-arrow { opacity: 1; }

/* CONTENT PANEL */
#content-panel {
  display: none;
  animation: slideIn 0.35s cubic-bezier(0.22, 1, 0.36, 1);
}
#content-panel.visible { display: block; }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.content-nav {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.btn-back {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 14px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn-back:hover { border-color: var(--accent); color: var(--text); }

.breadcrumb {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--dim);
  display: flex;
  align-items: center;
  gap: 6px;
}
.breadcrumb .sep { color: var(--border); }
.breadcrumb .current { color: var(--accent); }

.btn-mark {
  margin-left: auto;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  background: transparent;
  border: 1px solid var(--accent3);
  color: var(--accent3);
  border-radius: 6px;
  padding: 8px 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-mark:hover { background: rgba(68,229,180,0.1); }
.btn-mark.marked { background: rgba(68,229,180,0.15); }

/* CONTENT BODY */
.content-body { max-width: 780px; }

.content-title {
  font-family: 'Syne', sans-serif;
  font-size: clamp(24px, 3vw, 36px);
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--text);
  margin-bottom: 8px;
  line-height: 1.2;
}

.content-subtitle {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 32px;
}

.content-section {
  margin-bottom: 36px;
}

.section-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-label::after { content: ''; flex: 0 0 32px; height: 1px; background: var(--border); }

.prose {
  font-size: 16px;
  line-height: 1.85;
  color: #cccce0;
  font-family: 'IBM Plex Serif', serif;
}
.prose p { margin-bottom: 16px; }
.prose strong { color: var(--text); font-weight: 500; }
.prose em { color: var(--accent4); font-style: italic; }

/* FORMULA BOX */
.formula-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 8px;
  padding: 20px 24px;
  margin: 20px 0;
  font-family: 'Space Mono', monospace;
  font-size: 14px;
  color: var(--accent);
  overflow-x: auto;
}
.formula-box .formula-label {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

/* KEY POINTS */
.key-points {
  background: rgba(124,106,255,0.05);
  border: 1px solid rgba(124,106,255,0.15);
  border-radius: 10px;
  padding: 20px 24px;
  margin: 24px 0;
}
.key-points h4 {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 14px;
}
.key-points ul { list-style: none; }
.key-points li {
  display: flex;
  gap: 10px;
  color: #bbbbd0;
  font-size: 14px;
  line-height: 1.7;
  margin-bottom: 8px;
  font-family: 'IBM Plex Serif', serif;
}
.key-points li::before { content: '→'; color: var(--accent); font-family: 'Space Mono', monospace; flex-shrink: 0; }

/* CALLOUT */
.callout {
  border-radius: 8px;
  padding: 16px 20px;
  margin: 20px 0;
  display: flex;
  gap: 12px;
  font-size: 14px;
  line-height: 1.7;
  font-family: 'IBM Plex Serif', serif;
}
.callout.info { background: rgba(68,229,180,0.06); border: 1px solid rgba(68,229,180,0.2); color: #a0f0d0; }
.callout.warn { background: rgba(255,201,71,0.06); border: 1px solid rgba(255,201,71,0.2); color: #f0d0a0; }
.callout.note { background: rgba(255,107,107,0.06); border: 1px solid rgba(255,107,107,0.2); color: #f0a0a0; }
.callout-icon { flex-shrink: 0; font-size: 16px; }

/* DIVIDER */
.section-divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 40px 0;
}

/* QUESTIONS */
.questions-header {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.questions-header span {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--accent2);
  background: rgba(255,107,107,0.1);
  border: 1px solid rgba(255,107,107,0.2);
  border-radius: 20px;
  padding: 4px 12px;
}

.question-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 16px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.question-card:hover { border-color: rgba(255,107,107,0.3); }

.question-body {
  padding: 20px 24px;
}
.q-num {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--accent2);
  letter-spacing: 2px;
  margin-bottom: 10px;
}
.q-text {
  font-size: 15px;
  line-height: 1.75;
  color: var(--text);
  font-family: 'IBM Plex Serif', serif;
}

.btn-show-answer {
  display: block;
  width: 100%;
  padding: 14px 24px;
  background: var(--surface);
  border: none;
  border-top: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 1px;
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
}
.btn-show-answer:hover { background: rgba(255,107,107,0.06); color: var(--accent2); }
.btn-show-answer.revealed { color: var(--accent2); }

.answer-panel {
  display: none;
  padding: 20px 24px;
  background: rgba(255,107,107,0.04);
  border-top: 1px solid rgba(255,107,107,0.15);
  font-size: 14px;
  line-height: 1.85;
  color: #d0d0e8;
  font-family: 'IBM Plex Serif', serif;
}
.answer-panel.visible { display: block; animation: fadeIn 0.25s ease; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.answer-panel .ans-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--accent2);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.answer-panel p { margin-bottom: 10px; }
.answer-panel strong { color: #fff; }

.answer-formula {
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  background: rgba(0,0,0,0.3);
  border-left: 2px solid var(--accent2);
  padding: 10px 16px;
  margin: 12px 0;
  color: #ffaaaa;
  border-radius: 0 6px 6px 0;
}

/* NAV BETWEEN TOPICS */
.topic-nav {
  display: flex;
  gap: 12px;
  margin-top: 48px;
  padding-top: 32px;
  border-top: 1px solid var(--border);
}
.btn-topic-nav {
  flex: 1;
  padding: 16px 20px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  font-family: 'Space Mono', monospace;
}
.btn-topic-nav:hover { border-color: var(--accent); }
.btn-topic-nav .nav-dir { font-size: 10px; color: var(--dim); letter-spacing: 2px; margin-bottom: 6px; }
.btn-topic-nav .nav-title { font-size: 12px; color: var(--text); line-height: 1.4; }
.btn-topic-nav.next { text-align: right; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* SELECTION */
::selection { background: rgba(124,106,255,0.3); }

/* RESPONSIVE */
@media (max-width: 640px) {
  .modules-grid { grid-template-columns: 1fr; }
  .topic-nav { flex-direction: column; }
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-tag">BAPHY106 · VIT Chennai · 2025–2029</div>
    <h1>Foundations of<br>Quantum Mechanics</h1>
    <p class="subtitle">5 Modules · 43 Topics · Complete Study Guide</p>
    <div class="progress-bar-wrap">
      <span class="progress-label">PROGRESS</span>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
  </header>

  <!-- MODULE LIST -->
  <div id="home-view">
    <div class="modules-grid" id="modulesGrid"></div>
  </div>

  <!-- CONTENT PANEL -->
  <div id="content-panel">
    <div class="content-nav">
      <button class="btn-back" onclick="goHome()">← Modules</button>
      <div class="breadcrumb" id="breadcrumb"></div>
      <button class="btn-mark" id="markBtn" onclick="toggleStudied()">✓ Mark studied</button>
    </div>
    <div class="content-body" id="contentBody"></div>
  </div>
</div>

<script>
/* ===================== DATA ===================== */
const MODULES = [
  {
    id: 1,
    title: "Wave-Particle Duality",
    hours: "9 hrs",
    accent: "#7c6aff",
    topics: [
      { id: "1-1", title: "Limitations of Classical Physics", content: content_1_1 },
      { id: "1-2", title: "Blackbody Radiation & Planck's Hypothesis", content: content_1_2 },
      { id: "1-3", title: "Photoelectric Effect", content: content_1_3 },
      { id: "1-4", title: "Compton Effect", content: content_1_4 },
      { id: "1-5", title: "de Broglie Hypothesis & Matter Waves", content: content_1_5 },
      { id: "1-6", title: "Wave Function & Born's Interpretation", content: content_1_6 },
      { id: "1-7", title: "Heisenberg Uncertainty Principle", content: content_1_7 },
      { id: "1-8", title: "Stern-Gerlach Experiment", content: content_1_8 },
    ]
  },
  {
    id: 2,
    title: "Mathematical Foundations of QM",
    hours: "10 hrs",
    accent: "#ff6b6b",
    topics: [
      { id: "2-1", title: "Linear Vector Space & Basis", content: content_2_1 },
      { id: "2-2", title: "Hilbert Space & Inner Product", content: content_2_2 },
      { id: "2-3", title: "Dirac Notation (Bra-Ket)", content: content_2_3 },
      { id: "2-4", title: "Linear Operators & Matrix Algebra", content: content_2_4 },
      { id: "2-5", title: "Hermitian, Unitary & Projection Operators", content: content_2_5 },
      { id: "2-6", title: "Eigenvalues & Eigenvectors", content: content_2_6 },
      { id: "2-7", title: "Pauli Matrices & Applications", content: content_2_7 },
      { id: "2-8", title: "Commutation Relations", content: content_2_8 },
    ]
  },
  {
    id: 3,
    title: "Postulates of Quantum Mechanics",
    hours: "7 hrs",
    accent: "#44e5b4",
    topics: [
      { id: "3-1", title: "State Vector Representation", content: content_3_1 },
      { id: "3-2", title: "Measurement Postulate & Observables", content: content_3_2 },
      { id: "3-3", title: "Expectation Values", content: content_3_3 },
      { id: "3-4", title: "Schrödinger Wave Equation (Derivation)", content: content_3_4 },
      { id: "3-5", title: "Time-Independent Schrödinger Equation", content: content_3_5 },
      { id: "3-6", title: "Time-Dependent Schrödinger Equation", content: content_3_6 },
    ]
  },
  {
    id: 4,
    title: "Applications of Quantum Mechanics",
    hours: "7 hrs",
    accent: "#ffc947",
    topics: [
      { id: "4-1", title: "Particle in a 1-D Box", content: content_4_1 },
      { id: "4-2", title: "Eigenfunction & Energy Quantization", content: content_4_2 },
      { id: "4-3", title: "Zero Point Energy & Probability Density", content: content_4_3 },
      { id: "4-4", title: "Particle in a 3-D Box & Degeneracy", content: content_4_4 },
      { id: "4-5", title: "Quantum Tunneling", content: content_4_5 },
      { id: "4-6", title: "Scanning Tunnelling Microscope (STM)", content: content_4_6 },
    ]
  },
  {
    id: 5,
    title: "Elements of Quantum Computing",
    hours: "10 hrs",
    accent: "#b06eff",
    topics: [
      { id: "5-1", title: "Introduction & Classical vs Quantum Bits", content: content_5_1 },
      { id: "5-2", title: "Single Qubit & Bloch Sphere", content: content_5_2 },
      { id: "5-3", title: "Two Qubits & Entanglement", content: content_5_3 },
      { id: "5-4", title: "Bell States", content: content_5_4 },
      { id: "5-5", title: "Single Qubit Gates (Pauli, Hadamard)", content: content_5_5 },
      { id: "5-6", title: "Two Qubit Gates & CNOT", content: content_5_6 },
    ]
  }
];

/* ===================== CONTENT FUNCTIONS ===================== */
function makeSection(label, html) {
  return `<div class="content-section"><div class="section-label">${label}</div><div class="prose">${html}</div></div>`;
}
function makeFormula(label, formula) {
  return `<div class="formula-box"><div class="formula-label">${label}</div>${formula}</div>`;
}
function makeKeyPoints(points) {
  return `<div class="key-points"><h4>Key Points</h4><ul>${points.map(p=>`<li>${p}</li>`).join('')}</ul></div>`;
}
function makeCallout(type, icon, text) {
  return `<div class="callout ${type}"><span class="callout-icon">${icon}</span><span>${text}</span></div>`;
}
function makeQ(num, q, a) {
  return `<div class="question-card">
    <div class="question-body"><div class="q-num">Q${num}</div><div class="q-text">${q}</div></div>
    <button class="btn-show-answer" onclick="toggleAnswer(this)">▶ Show Answer</button>
    <div class="answer-panel"><div class="ans-label">Answer</div>${a}</div>
  </div>`;
}

/* ===================== TOPIC CONTENT ===================== */

/* --- MODULE 1 --- */
function content_1_1() { return `
<div class="content-title">Limitations of Classical Physics</div>
<div class="content-subtitle">Module 1 · Wave-Particle Duality</div>
${makeSection("Overview", `<p>Classical physics — built on Newton's mechanics and Maxwell's electromagnetic theory — was triumphant in explaining macroscopic phenomena. But by the late 19th century, it ran into a series of <strong>catastrophic failures</strong> at the atomic and subatomic scale.</p>`)}
${makeSection("The Major Failures", `<p>Classical theory could <em>not</em> explain the following experimental observations:</p>`)}
${makeKeyPoints([
  "<strong>Blackbody Radiation:</strong> The Rayleigh–Jeans law predicted infinite energy at short wavelengths (UV catastrophe) — contradicting observation.",
  "<strong>Discrete Atomic Spectra:</strong> Atoms emit light only at specific, sharp frequencies. Classical theory predicts continuous emission.",
  "<strong>Photoelectric Effect:</strong> Light below a threshold frequency ejects no electrons, regardless of intensity — impossible classically.",
  "<strong>Specific Heat of Metals:</strong> Classical equipartition theorem fails at low temperatures.",
  "<strong>Stability of Atoms:</strong> A classically orbiting electron should radiate energy and spiral into the nucleus in ~10⁻⁸ s.",
  "<strong>Compton & Raman Effects:</strong> Scattering experiments showed light behaves as discrete particles.",
  "<strong>Zeeman Effect:</strong> Splitting of spectral lines in magnetic fields required quantum angular momentum."
])}
${makeCallout("warn", "⚠️", "<strong>The core problem:</strong> Classical physics assumes all physical quantities (energy, momentum, position) can take any continuous value. Quantum mechanics introduces the revolutionary idea that many quantities are <em>quantized</em> — they only take discrete values.")}
${makeSection("Birth of Quantum Mechanics", `<p>The crises forced physicists to radically revise their understanding. Between 1900–1930, Planck, Einstein, Bohr, de Broglie, Heisenberg, Schrödinger, and Dirac built a completely new framework: <strong>Quantum Mechanics</strong>.</p>
<p>Newton's laws of motion apply only to macroscopic particles. The Schrödinger equation, by contrast, works for <strong>both macroscopic and microscopic</strong> particles, reducing to classical results in the large-scale limit (Bohr's Correspondence Principle).</p>`)}
<hr class="section-divider">
<div class="questions-header">Practice Questions <span>5 Qs</span></div>
${makeQ(1, "Why did classical physics fail to explain the stability of atoms?",
  `<p>A classically orbiting electron undergoes centripetal acceleration. Any accelerating charge radiates electromagnetic energy (Larmor radiation). Therefore, the electron would continuously lose energy, causing it to spiral inward toward the nucleus. Classical calculations predict collapse within ~10⁻⁸ seconds. In reality, atoms are stable — classical physics simply cannot explain this. Quantum mechanics resolves it by quantizing electron orbits into allowed discrete energy levels.</p>`
)}
${makeQ(2, "List any four phenomena that classical physics failed to explain.",
  `<p>Classical physics failed to explain:</p>
  <p>1. <strong>Blackbody radiation</strong> — UV catastrophe predicted by Rayleigh–Jeans law.</p>
  <p>2. <strong>Photoelectric effect</strong> — threshold frequency dependence cannot be explained by wave theory.</p>
  <p>3. <strong>Discrete spectral lines of atoms</strong> — classical theory predicts continuous emission.</p>
  <p>4. <strong>Compton effect</strong> — momentum transfer during X-ray scattering requires particle nature of light.</p>`
)}
${makeQ(3, "What is the fundamental difference between classical and quantum treatment of energy?",
  `<p>In classical mechanics, energy is treated as a <strong>continuous variable</strong> — a particle or oscillator can have any arbitrary amount of energy. In quantum mechanics, energy is <strong>quantized</strong>: it can only take discrete values that are integer multiples of a fundamental quantum (hν for electromagnetic oscillators). This quantization condition, first proposed by Planck, was the revolutionary departure from classical thinking.</p>`
)}
${makeQ(4, "What is Bohr's Correspondence Principle?",
  `<p>Bohr's Correspondence Principle states that in the limit of <strong>large quantum numbers</strong> (or equivalently, macroscopic scale), the predictions of quantum mechanics must agree with classical physics. This is because for very large systems, the discrete energy levels are so closely spaced that they appear continuous — just as classical physics assumes. The principle ensures that quantum mechanics doesn't contradict established classical results for everyday objects.</p>`
)}
${makeQ(5, "Why is Newton's law insufficient for microscopic particles?",
  `<p>Newton's laws treat particles as having definite, simultaneously measurable positions and momenta. At the microscopic scale, the Heisenberg Uncertainty Principle (Δx·Δp ≥ ℏ/2) makes this impossible — you cannot precisely know both simultaneously. Additionally, microscopic particles exhibit <strong>wave-like behavior</strong> (diffraction, interference) that Newton's laws cannot describe. The Schrödinger equation replaces Newton's F = ma at the quantum level, naturally incorporating both the probabilistic nature and wave-particle duality.</p>`
)}

${makeFormula("Planck's Energy Quantization", `E = nhν    where n = 0, 1, 2, 3, ...

${makeCallout("info", "💡", "Planck's key insight: Higher frequency modes are exponentially suppressed because they require large quanta of energy — which are thermally unavailable. This kills the UV catastrophe naturally.")}

<hr class="section-divider">
<div class="questions-header">Practice Questions <span>6 Qs</span></div>
${makeQ(1, "What is a blackbody? Why is a small hole in a cavity a good approximation?",

)}
${makeQ(2, "Explain the Ultraviolet Catastrophe.",
  `<p>The Rayleigh–Jeans law derived the energy density of blackbody radiation by treating modes as classical oscillators, each with average energy k_BT. The formula u(λ) = 8πk_BT/λ⁴ works well at large wavelengths, but as λ → 0, u → ∞. This predicted that a blackbody would radiate infinite energy in the ultraviolet and shorter wavelength regions — an absurd result. This failure of classical theory was named the <strong>Ultraviolet Catastrophe</strong> and was one of the most serious crises in classical physics.</p>`
)}
${makeQ(3, "State Planck's hypothesis and write the energy quantization formula.",
  `<p>Planck's Hypothesis (1900): The energy of electromagnetic oscillators in the blackbody cavity walls is not continuous but is restricted to discrete (quantized) values. An oscillator vibrating at frequency ν can only have energies:</p>
  <div class="answer-formula">E_n = nhν,  n = 0, 1, 2, 3, ...</div>
  <p>where h = 6.626 × 10⁻³⁴ J·s is Planck's constant. Oscillators can only emit or absorb energy in chunks of hν. This quantization condition eliminates the UV catastrophe because high-frequency modes (large hν) are exponentially unlikely to be excited at a given temperature.</p>`
)}
${makeQ(4, "Write Planck's radiation formula and show how it reduces to Rayleigh–Jeans at long wavelengths.",

  <div class="answer-formula">e^(hc/λk_BT) − 1 ≈ hc/λk_BT</div>
  <p>Substituting: u_P(λ) ≈ 8πhc/λ⁵ · λk_BT/hc = 8πk_BT/λ⁴ = u_RJ(λ)</p>

)}

)}
${makeQ(6, "A blackbody radiates at a surface temperature of 5778 K. Estimate its peak wavelength.",

  <p>This falls in the <strong>green-yellow</strong> region of the visible spectrum — consistent with the Sun appearing white/yellow (since it radiates across the entire visible spectrum). This confirms why the Sun is well-modeled as a blackbody.</p>`
)}

function content_1_3() { return `
<div class="content-title">Photoelectric Effect</div>
<div class="content-subtitle">Module 1 · Wave-Particle Duality</div>
${makeSection("The Phenomenon", `<p>The <strong>photoelectric effect</strong> is the emission of electrons from a metal surface when light of sufficient frequency shines on it. First observed by Hertz (1887) and investigated by Lenard, it was <em>theoretically explained by Einstein in 1905</em> — earning him the Nobel Prize, not relativity.</p>`)}
${makeSection("Experimental Observations (Laws of Photoelectric Emission)", `<p>Lenard and Millikan established these experimental laws:</p>`)}
${makeKeyPoints([
  "<strong>Threshold frequency (ν₀):</strong> For each metal, there exists a minimum frequency below which NO electrons are emitted, regardless of light intensity.",
  "<strong>Instantaneous emission:</strong> Electrons are emitted almost instantly (< 10⁻⁹ s) once ν > ν₀ — no time delay as wave theory would predict.",
  "<strong>KE independent of intensity:</strong> The maximum kinetic energy of emitted electrons depends on ν (frequency), NOT on the intensity of light.",
  "<strong>Current proportional to intensity:</strong> The number of emitted electrons (hence photocurrent) is proportional to light intensity — more photons mean more electrons.",
  "<strong>Stopping potential V₀:</strong> The negative voltage required to stop all electrons. eV₀ = ½mv²_max."
])}
${makeCallout("warn", "⚠️", "Classical wave theory CANNOT explain these observations. Wave theory predicts: (a) electrons should accumulate energy gradually — time delay before emission; (b) brighter light (higher amplitude waves) should give higher KE electrons. Both are wrong experimentally.")}
${makeSection("Einstein's Explanation (1905)", `<p>Einstein extended Planck's quantization to say: <strong>light itself consists of discrete particles called photons</strong>, each carrying energy E = hν. A single photon interacts with a single electron (one-to-one interaction).</p>
<p>The photon's energy is used in two parts:</p>
<p>(a) Work function φ = hν₀: minimum energy to liberate the electron from the metal surface.<br>
(b) Remaining energy becomes kinetic energy of the ejected electron.</p>`)}
${makeFormula("Einstein's Photoelectric Equation", `hν = φ + ½mv²_max
hν = hν₀ + KE_max
KE_max = h(ν − ν₀) = eV₀
where φ = hν₀ = work function of the metal`)}
${makeKeyPoints([
  "Work function φ: metal-specific minimum energy to remove an electron from the surface.",
  "If ν < ν₀: photon energy insufficient → no emission, even at high intensity.",
  "If ν > ν₀: emission occurs. Higher ν → higher KE of photoelectrons.",
  "Potassium: φ = 2.0 eV. Red light (1.77 eV) cannot eject electrons; green (2.25 eV) and violet (3.1 eV) can."
])}
<hr class="section-divider">
<div class="questions-header">Practice Questions <span>6 Qs</span></div>
${makeQ(1, "State the laws of photoelectric emission.",
  `<p>The laws of photoelectric emission (Lenard & Millikan):</p>
  <p>1. For a given photosensitive material, there exists a minimum frequency ν₀ (threshold frequency) below which no photoelectrons are emitted, regardless of the intensity of incident radiation.</p>
  <p>2. The photoelectric current is directly proportional to the intensity of incident light (for ν > ν₀).</p>
  <p>3. The maximum kinetic energy of photoelectrons is directly proportional to the frequency of incident light but is independent of its intensity.</p>
  <p>4. Photoelectric emission is instantaneous (time lag < 10⁻⁹ s).</p>`
)}
${makeQ(2, "Why does classical wave theory fail to explain the photoelectric effect?",
  `<p>Classical wave theory predicts: (1) Since wave energy depends on amplitude (intensity), brighter light should produce higher-energy electrons — contradicts observation. (2) For dim light, electrons must wait to accumulate enough energy — a significant time delay is expected. Experimentally, emission is instantaneous. (3) Any frequency of light (given sufficient intensity) should eventually eject electrons — contradicts the threshold frequency observation. All three predictions are experimentally wrong, conclusively showing that light cannot be a classical wave in this context.</p>`
)}
${makeQ(3, "Write and explain Einstein's photoelectric equation.",
  `<p>Einstein's photoelectric equation:</p>
  <div class="answer-formula">hν = φ + ½mv²_max = hν₀ + KE_max</div>
  <p><strong>hν</strong>: energy of one photon of frequency ν (incident light).</p>
  <p><strong>φ = hν₀</strong>: work function — the minimum energy needed to remove an electron from the metal surface. ν₀ is the threshold frequency.</p>
  <p><strong>½mv²_max</strong>: maximum kinetic energy of the emitted photoelectron.</p>
  <p>Each photon interacts with exactly one electron. Part of the photon's energy overcomes the binding (work function), and the rest appears as the electron's kinetic energy.</p>`
)}
${makeQ(4, "The work function of sodium is 2.3 eV. What is its threshold frequency? Will light of wavelength 400 nm cause photoelectric emission?",
  `<p>Threshold frequency: φ = hν₀ → ν₀ = φ/h</p>
  <div class="answer-formula">ν₀ = (2.3 × 1.6×10⁻¹⁹) / (6.626×10⁻³⁴) = 5.56 × 10¹⁴ Hz</div>
  <p>For 400 nm light: ν = c/λ = (3×10⁸)/(400×10⁻⁹) = 7.5 × 10¹⁴ Hz</p>
  <p>Since ν (7.5×10¹⁴) > ν₀ (5.56×10¹⁴), <strong>yes, photoelectric emission will occur.</strong></p>
  <p>KE_max = hν − φ = (6.626×10⁻³⁴ × 7.5×10¹⁴)/(1.6×10⁻¹⁹) − 2.3 = 3.11 − 2.3 = 0.81 eV</p>`
)}
${makeQ(5, "What is stopping potential? How is it related to the work function?",
  `<p><strong>Stopping potential V₀</strong> is the minimum retarding potential applied to the collector electrode that brings the photocurrent to zero — i.e., it stops even the most energetic photoelectrons.</p>
  <div class="answer-formula">eV₀ = KE_max = hν − φ = h(ν − ν₀)</div>
  <p>At threshold (ν = ν₀): V₀ = 0 (no KE, electrons just barely escape). For ν > ν₀: V₀ increases linearly with frequency. Measuring V₀ vs. ν gives a straight line with slope h/e — this is how Millikan experimentally verified Planck's constant.</p>`
)}
${makeQ(6, "Explain why photoelectric emission is instantaneous.",
  `<p>In Einstein's quantum picture, each photon carries the entire energy hν concentrated in a single "packet." When this photon strikes an electron, it transfers all its energy in one instantaneous interaction — like a billiard ball collision. There's no accumulation period. In contrast, classical waves spread energy continuously over the entire surface, requiring time for an electron to absorb enough. Since a single photon above threshold immediately provides sufficient energy, emission is instantaneous (< 10⁻⁹ s, limited only by quantum transition timescales).</p>`
)}

function content_1_4() { return `
<div class="content-title">Compton Effect</div>
<div class="content-subtitle">Module 1 · Wave-Particle Duality</div>
${makeSection("The Phenomenon", `<p>In 1923, Arthur Compton discovered that when X-rays scatter off free (loosely bound) electrons, the scattered X-rays have a <strong>longer wavelength</strong> than the incident X-rays. This wavelength shift depends on the scattering angle — but NOT on the original wavelength or the material. Classical wave theory predicts no wavelength change during scattering (Thomson scattering). The Compton effect conclusively proved that <strong>light has momentum</strong> — i.e., photons are real particles.</p>`)}
${makeSection("Derivation Logic", `<p>Compton treated the interaction as a relativistic elastic collision between a photon and a stationary electron. Using conservation of energy and conservation of momentum (in both x and y directions), he derived:</p>`)}
${makeFormula("Compton Shift Formula", `Δλ = λ' − λ = (h/m₀c)(1 − cosθ)
where:
  λ  = wavelength of incident X-ray
  λ' = wavelength of scattered X-ray
  θ  = angle of scattered photon with original direction
  h/m₀c = 2.426 × 10⁻¹² m = Compton wavelength of electron`)}
${makeKeyPoints([
  "Δλ = 0 at θ = 0° (forward scatter — no change)",
  "Δλ = h/m₀c at θ = 90° (maximum for practical purposes)",
  "Δλ = 2h/m₀c at θ = 180° (backscatter — maximum shift, 4.85 pm)",
  "The Compton wavelength h/m₀c = 2.426 × 10⁻¹² m is a fundamental constant",
  "Compton effect → photon has momentum p = h/λ = hν/c",
  "Proves light behaves as a PARTICLE during scattering"
])}
${makeCallout("info", "💡", "The Compton effect and the photoelectric effect together provide the strongest direct evidence for the particle nature of electromagnetic radiation (photons).")}
<hr class="section-divider">
<div class="questions-header">Practice Questions <span>5 Qs</span></div>
${makeQ(1, "State the Compton effect and why classical theory fails to explain it.",
  `<p>The <strong>Compton effect</strong>: when X-rays scatter off loosely bound electrons, the scattered radiation has a <strong>longer wavelength</strong> than the incident radiation. The shift Δλ depends only on the scattering angle θ.</p>
  <p>Classical theory (wave picture) predicts: the incident wave drives the electron to oscillate at the same frequency, which then re-radiates at the same frequency → no wavelength change (Thomson scattering). Experimentally, the wavelength always increases. Classical theory completely fails to explain this, while quantum particle treatment (photon-electron collision) perfectly predicts the observed shift.</p>`
)}
${makeQ(2, "Derive/state the Compton shift formula and identify all symbols.",
  `<div class="answer-formula">Δλ = λ' − λ = (h / m₀c)(1 − cosθ)</div>
  <p><strong>λ</strong>: wavelength of incident photon</p>
  <p><strong>λ'</strong>: wavelength of scattered photon</p>
  <p><strong>θ</strong>: angle between scattered photon and original direction</p>
  <p><strong>h</strong>: Planck's constant = 6.626 × 10⁻³⁴ J·s</p>
  <p><strong>m₀</strong>: rest mass of electron = 9.11 × 10⁻³¹ kg</p>
  <p><strong>c</strong>: speed of light = 3 × 10⁸ m/s</p>
  <p><strong>h/m₀c</strong> = 2.426 × 10⁻¹² m = Compton wavelength of the electron</p>`
)}
${makeQ(3, "Calculate Compton shift at θ = 90° and θ = 180°.",
  `<p>Compton wavelength: h/m₀c = 2.426 × 10⁻¹² m</p>
  <p><strong>At θ = 90°:</strong> Δλ = (h/m₀c)(1 − cos90°) = 2.426 × 10⁻¹² × (1 − 0) = <strong>2.426 pm</strong></p>
  <p><strong>At θ = 180°:</strong> Δλ = (h/m₀c)(1 − cos180°) = 2.426 × 10⁻¹² × (1 − (−1)) = 2.426 × 2 = <strong>4.85 pm</strong></p>
  <p>The maximum Compton shift occurs at backscattering (θ = 180°).</p>`
)}
${makeQ(4, "How does Compton effect prove that photons have momentum?",
  `<p>In classical wave theory, radiation carries energy but does NOT carry momentum in the particle sense. The Compton effect requires modeling the interaction as a collision between a photon (with momentum p = hν/c = h/λ) and an electron at rest. Applying conservation of both energy and momentum vector equations to this collision gives the Compton formula — which matches experiment perfectly. The only way to get this agreement is to assign the photon a definite momentum <strong>p = h/λ</strong>. Thus, the Compton effect is direct experimental proof that photons carry momentum.</p>`
)}
${makeQ(5, "What is the Compton wavelength? What is its physical significance?",
  `<p>The <strong>Compton wavelength</strong> of the electron is:</p>
  <div class="answer-formula">λ_C = h / m₀c = 2.426 × 10⁻¹² m = 2.426 pm</div>
  <p>It sets the characteristic scale of the Compton shift. Physically, it's the wavelength of a photon whose energy equals the rest mass energy of the electron (m₀c²). It marks the boundary where relativistic quantum effects become important. The Compton effect is only observable when the incident wavelength λ is comparable to λ_C (i.e., X-rays or γ-rays). For visible light (λ >> λ_C), the shift is negligible.</p>`
)}

function content_1_5() { return `

  <p>This is ~10¹⁹ times smaller than a proton diameter (~10⁻¹⁵ m). No experimental apparatus can detect such a wavelength. This is why macroscopic objects don't exhibit observable wave behavior — consistent with the Correspondence Principle: quantum effects vanish at large scales.</p>`
)}
${makeQ(5, "What is the physical significance of the de Broglie wavelength?",
  `<p>The de Broglie wavelength λ = h/p is the characteristic scale over which quantum wave effects (interference, diffraction) become significant for a particle. When the de Broglie wavelength is comparable to the size of the physical system (e.g., crystal lattice spacing, atomic size ~Å), quantum effects dominate. When λ is negligibly small compared to the system size (macroscopic objects), the wave nature is undetectable and classical physics applies. Thus, λ marks the <em>quantum–classical boundary</em> for a given particle.</p>`
)}
${makeQ(6, "How was the de Broglie hypothesis experimentally verified? (Davisson–Germer experiment)",
  `<p>In 1927, Davisson and Germer directed a beam of electrons (accelerated through 54 V, so λ = 1.67 Å) at a nickel crystal and observed a sharp diffraction peak at θ = 50° — identical to X-ray diffraction patterns. The crystal acted as a diffraction grating for the electron waves. The observed angle matched Bragg's law prediction using the de Broglie wavelength: d·sinθ = nλ. This was the first direct experimental confirmation that moving electrons have an associated wave, proving de Broglie's hypothesis correct. Davisson and G.P. Thomson received the 1937 Nobel Prize.</p>`
)}

${makeFormula("Normalization Condition", `∫∫∫ |Ψ(x,y,z,t)|² dV = 1  (over all space)

${makeSection("Properties of a Valid Wave Function", `<p>For Ψ to represent a physical state, it must be:</p>`)}

<div class="questions-header">Practice Questions <span>5 Qs</span></div>
${makeQ(1, "What is a wave function? What is its physical significance?",
  `<p>A <strong>wave function Ψ(x,y,z,t)</strong> is a complex-valued mathematical function that completely describes the quantum state of a particle. By itself, Ψ has no direct physical meaning — it is not observable. However, its squared modulus <strong>|Ψ|²</strong> has direct physical significance:</p>

${makeQ(2, "State the normalization condition and explain its physical meaning.",

)}
${makeQ(3, "Write the conditions for a physically acceptable wave function.",
  `<p>A physically acceptable (well-behaved) wave function must satisfy:</p>

  <p>3. <strong>Continuous:</strong> Ψ must be continuous everywhere (except at infinite potential barriers).</p>
  <p>4. <strong>Continuous first derivative:</strong> ∂Ψ/∂x must also be continuous (except where V = ∞).</p>
  <p>5. <strong>Square-integrable:</strong> ∫|Ψ|²dV must be finite — so normalization is possible.</p>

)}
${makeQ(4, "What is probability density? How is it related to the wave function?",

  <p>It represents the probability per unit volume of finding the particle at a given location at a given time. Since Ψ is complex (Ψ = a + ib), we cannot directly assign probability to Ψ itself — only to |Ψ|² = a² + b², which is always real and non-negative. The probability of finding the particle in volume element dV at position r is:</p>

${makeQ(5, "What is the orthogonality condition? What does it mean physically?",

function content_1_7() { return `
<div class="content-title">Heisenberg Uncertainty Principle</div>
<div class="content-subtitle">Module 1 · Wave-Particle Duality</div>
${makeSection("Statement", `<p>Werner Heisenberg (1927) established one of the most profound statements in physics: it is <em>fundamentally impossible</em> to simultaneously measure certain pairs of physical quantities with arbitrary precision. This is not a limitation of measurement technology — it is a deep property of nature.</p>`)}
${makeFormula("Heisenberg Uncertainty Principle", `Position–Momentum:  Δx · Δp ≥ ℏ/2  (or h/4π)
Energy–Time:         ΔE · Δt ≥ ℏ/2  (or h/4π)
where ℏ = h/2π = 1.055 × 10⁻³⁴ J·s (reduced Planck's constant)`)}
${makeSection("Why Does This Uncertainty Arise?", `<p>The uncertainty is a consequence of the <strong>wave nature of matter</strong>. A particle's position corresponds to the location of its wave packet, and its momentum corresponds to the wavelength. To localize a particle precisely (small Δx), you need to superpose many waves of different wavelengths — making the momentum uncertain (large Δp). To have a precise momentum (definite wavelength), the wave extends everywhere — making position completely undefined.</p>
<p>This is the <em>wave-packet duality</em> argument: localization in position requires spreading in momentum and vice versa.</p>`)}
${makeKeyPoints([
  "Δx → 0 (exact position) forces Δp → ∞ (completely unknown momentum).",
  "Δp → 0 (exact momentum) forces Δx → ∞ (completely unknown position).",
  "The principle applies to any pair of conjugate observables.",
  "ΔE · Δt ≥ ℏ/2: short-lived states have inherently broad energy spectra (natural linewidth).",
  "This is NOT a measurement disturbance — it's a fundamental limit of nature.",
  "For macroscopic objects, ℏ is negligibly small → classical physics holds."
])}
${makeCallout("warn", "⚠️", "The Uncertainty Principle proves it is impossible to design an experiment that simultaneously demonstrates wave and particle nature of matter with full precision.")}
${makeSection("Applications & Implications", `<p><strong>Zero-Point Energy:</strong> A particle confined in a box cannot have zero kinetic energy — because then Δp = 0 would require Δx = ∞ (it's not in the box). So there's always a minimum "zero-point energy."</p>
<p><strong>Atomic stability:</strong> The electron cannot fall into the nucleus — that would require Δx ~ 10⁻¹⁵ m, forcing Δp ~ ℏ/10⁻¹⁵ m, giving enormous kinetic energy (~200 MeV) far exceeding the nuclear binding energy.</p>
<p><strong>Natural linewidth:</strong> An excited atomic state of lifetime Δt has an energy uncertainty ΔE = ℏ/Δt, causing spectral lines to have finite width.</p>`)}
<hr class="section-divider">
<div class="questions-header">Practice Questions <span>5 Qs</span></div>
${makeQ(1, "State the Heisenberg Uncertainty Principle and write the mathematical expressions.",
  `<p>Heisenberg's Uncertainty Principle states: It is fundamentally impossible to simultaneously determine with arbitrary precision both the position and momentum of a quantum particle. The more precisely the position is known, the less precisely the momentum can be known, and vice versa:</p>
  <div class="answer-formula">Δx · Δp ≥ ℏ/2 = h/4π</div>
  <p>Similarly for energy and time:</p>
  <div class="answer-formula">ΔE · Δt ≥ ℏ/2 = h/4π</div>
  <p>where Δx = uncertainty in position, Δp = uncertainty in momentum, ΔE = uncertainty in energy, Δt = uncertainty in time.</p>`
)}
${makeQ(2, "An electron is confined to a box of length 10⁻¹⁰ m. Estimate the minimum uncertainty in its velocity.",
  `<p>Given: Δx = 10⁻¹⁰ m (box length is the position uncertainty)</p>
  <div class="answer-formula">Δp ≥ ℏ/Δx = 1.055×10⁻³⁴ / 10⁻¹⁰ = 1.055 × 10⁻²⁴ kg·m/s</div>
  <div class="answer-formula">Δv = Δp/m = 1.055×10⁻²⁴ / 9.11×10⁻³¹ = 1.16 × 10⁶ m/s ≈ 10⁶ m/s</div>
  <p>This is ~0.4% of the speed of light — significant. For comparison, a macroscopic ball in a 1 m box: Δv = ℏ/(mΔx) ≈ 10⁻³⁴/(0.1×1) = 10⁻³³ m/s — completely undetectable.</p>`
)}
${makeQ(3, "Explain how the Uncertainty Principle explains the stability of atoms.",
  `<p>Classical electromagnetism predicts the electron should spiral into the nucleus. The Uncertainty Principle prevents this: if the electron were confined within the nucleus (Δx ~ 10⁻¹⁵ m), then:</p>
  <div class="answer-formula">Δp ≥ ℏ/Δx ~ 1.055×10⁻³⁴/10⁻¹⁵ = 1.055×10⁻¹⁹ kg·m/s</div>
  <div class="answer-formula">KE ~ (Δp)²/2m ~ (10⁻¹⁹)²/(2×9.11×10⁻³¹) ~ 5.8×10⁻⁹ J ~ 36 MeV</div>
  <p>This enormous kinetic energy far exceeds the Coulomb potential energy binding the electron (~13.6 eV for hydrogen). The electron cannot be confined to the nucleus — the Uncertainty Principle stabilizes atoms by setting a minimum electron orbital radius (Bohr radius ~0.53 Å).</p>`
)}
${makeQ(4, "What is natural linewidth and how is it related to the uncertainty principle?",
  `<p>An electron in an excited atomic state spontaneously decays to the ground state after a mean lifetime τ (typically ~10⁻⁸ s). The state exists only for a time Δt ~ τ. By the energy–time uncertainty relation:</p>
  <div class="answer-formula">ΔE ≥ ℏ/τ ~ 1.055×10⁻³⁴/10⁻⁸ = 10⁻²⁶ J ≈ 6.6×10⁻⁸ eV</div>
  <p>This energy uncertainty means the emitted photon's frequency is not perfectly sharp — the spectral line has a fundamental minimum width called the <strong>natural linewidth</strong>. Even with perfect instruments, spectral lines cannot be infinitely narrow. Longer-lived states → smaller ΔE → narrower lines (laser transitions exploit very long-lived metastable states).</p>`
)}
${makeQ(5, "Distinguish between the Heisenberg uncertainty principle and measurement disturbance.",
  `<p>Many people confuse the uncertainty principle with the idea that 'measuring disturbs the system.' This is NOT the correct interpretation.</p>
  <p><strong>Measurement disturbance:</strong> In classical mechanics, you could in principle measure without disturbing (e.g., use a very gentle probe). This is a practical limitation.</p>
  <p><strong>Heisenberg Uncertainty:</strong> Even with a theoretically perfect, non-disturbing measurement device, quantum mechanics imposes fundamental limits. The uncertainty arises from the <em>wave nature of particles</em> — a particle described by a narrow wave packet (localized position) necessarily contains a broad spectrum of momenta. This is an intrinsic property of quantum states, not a measurement artifact. Δx·Δp ≥ ℏ/2 is a statement about the state itself.</p>`
)}

function content_1_8() { return `
<div class="content-title">Stern-Gerlach Experiment</div>
<div class="content-subtitle">Module 1 · Wave-Particle Duality</div>
${makeSection("Concept & Setup", `<p>In 1922, Otto Stern and Walther Gerlach demonstrated the <strong>quantization of angular momentum</strong> and proved the existence of <strong>electron spin</strong>. They directed a beam of silver atoms through an inhomogeneous (non-uniform) magnetic field and observed the beam split into exactly two spots on a detector screen — not a continuous smear as classical physics predicts.</p>`)}
${makeSection("Why Silver Atoms?", `<p>Silver (Ag) has atomic configuration: [Kr] 4d¹⁰ 5s¹. The 46 inner electrons have zero net angular momentum. The single <strong>5s¹ outer electron</strong> has orbital angular momentum L = 0, so any deflection is <em>purely due to spin angular momentum</em>. Silver is also neutral (not deflected by electric Lorentz force) and forms a stable monatomic gas — ideal for a clean experiment.</p>`)}
${makeSection("Force on Atoms in Inhomogeneous Field", `<p>Silver atoms are neutral, so the force cannot be Lorentz (qv×B). Instead, the force arises from the magnetic <strong>dipole moment</strong> of the atom in a non-uniform field:</p>`)}
${makeFormula("Force on Magnetic Dipole", `F = ∇(μ·B)  →  F_z = μ_z · (∂B_z/∂z)
where μ_z = −g·(e/2m)·S_z  (z-component of spin magnetic moment)
Therefore: F_z ∝ S_z`)}
${makeSection("Result & Conclusion", `<p>Classical physics predicts: the magnetic moment can point in any direction → continuous smear on the screen. The experiment showed <strong>exactly two discrete spots</strong>, corresponding to:</p>`)}
${makeFormula("Electron Spin Quantum Number", `m_s = +½  (spin-up,  "↑")
m_s = −½  (spin-down, "↓")
s = ½`)}
${makeKeyPoints([
  "The beam split into EXACTLY 2 discrete spots — proving angular momentum is quantized.",
  "This quantized property is called <strong>electron spin</strong> — an intrinsic angular momentum.",
  "Spatial quantization: angular momentum can only orient in specific discrete directions relative to B field.",
  "Two-state system: spin-up (m_s = +½) and spin-down (m_s = −½).",
  "Spin is an intrinsic quantum property — not a classical spinning motion.",
  "Experiment confirms Bohr-Sommerfeld quantum theory and is foundational to quantum mechanics."
])}
${makeCallout("info", "💡", "Stern sent a postcard to Bohr the day after the observation. Ironically, it was later realized that Bohr's orbital theory didn't correctly explain the result — spin was not predicted until 1925 by Goudsmit and Uhlenbeck.")}
<hr class="section-divider">
<div class="questions-header">Practice Questions <span>5 Qs</span></div>
${makeQ(1, "Describe the Stern-Gerlach experiment and state its significance.",
  `<p><strong>Setup:</strong> Silver atoms are vaporized in an oven and directed through collimating slits to form a beam. This beam passes through a region of <em>inhomogeneous</em> magnetic field (special magnet design — one pole sharp, other flat — to create strong field gradient ∂B/∂z). The deflected atoms are collected on a detector screen.</p>
  <p><strong>Result:</strong> Instead of a continuous distribution (classical prediction), the beam splits into exactly <strong>two discrete spots</strong>, corresponding to spin-up (m_s = +½) and spin-down (m_s = −½) states.</p>
  <p><strong>Significance:</strong> (1) Proved quantization of angular momentum. (2) Discovered electron spin. (3) Demonstrated spatial quantization — angular momentum takes only discrete orientations relative to a magnetic field. (4) Provided a method to separate quantum states — basis of modern quantum technologies.</p>`
)}
${makeQ(2, "Why is an inhomogeneous magnetic field used in the Stern-Gerlach experiment?",
  `<p>In a <strong>uniform</strong> magnetic field, a magnetic dipole experiences a <em>torque</em> (causing precession) but no net translational force — it would not be deflected. A <strong>non-uniform (inhomogeneous)</strong> field exerts a net force F_z = μ_z · (∂B_z/∂z) on a dipole, deflecting it in the z-direction proportional to the z-component of its magnetic moment. Since the silver atom's magnetic moment comes from electron spin (μ_z ∝ m_s), atoms with different m_s values experience different forces and deflect to different positions, revealing the discrete spin states.</p>`
)}
${makeQ(3, "Why was silver specifically chosen for the Stern-Gerlach experiment?",
  `<p>Silver was chosen for several reasons:</p>
  <p>1. <strong>One unpaired outer electron (5s¹):</strong> 46 inner electrons pair up, canceling their contributions. The single outer electron has L = 0 (s-orbital) — so ALL magnetic effect is from its spin alone. This gives a clean two-state splitting.</p>
  <p>2. <strong>Neutral atom:</strong> Not deflected by electric fields — only magnetic deflection is observed.</p>
  <p>3. <strong>Monatomic gas:</strong> Doesn't form diatomic molecules, giving a well-defined beam.</p>
  <p>4. <strong>Chemically inert under conditions:</strong> Doesn't react with apparatus walls.</p>
  <p>5. <strong>Detectable on screen:</strong> Silver atoms leave a visible deposit on the collector plate.</p>`
)}
${makeQ(4, "What is spatial quantization? Explain with reference to the Stern-Gerlach experiment.",
  `<p><strong>Spatial quantization</strong> means that the angular momentum of a quantum particle can only orient itself in specific discrete directions relative to an external reference (magnetic field), NOT in any arbitrary direction as classical physics allows.</p>
  <p>In the Stern-Gerlach experiment, the z-axis is defined by the magnetic field direction. Electron spin angular momentum S can only have z-components m_s = +½ or m_s = −½ (in units of ℏ). Classically, S could point in any direction, giving m_s values ranging continuously from −½ to +½ → a smear. Quantum mechanically, only two discrete values are allowed → exactly two spots. The 2 observed spots = 2 allowed spatial orientations = spatial quantization.</p>`
)}
${makeQ(5, "What does the Stern-Gerlach result reveal about electron spin?",
  `<p>The Stern-Gerlach result reveals:</p>
  <p>1. Electrons possess an intrinsic property called <strong>spin</strong>, with quantum number s = ½.</p>
  <p>2. Spin is a <em>two-state system</em>: the spin angular momentum along any axis can only take two values: m_s = +½ (spin-up) or m_s = −½ (spin-down).</p>
  <p>3. Spin is NOT classical rotation — electrons have no physical size to "spin" in the classical sense. It is a purely quantum mechanical property.</p>
  <p>4. Spin contributes to magnetic moment: μ_spin = −g(e/2m)S, where g ≈ 2.0023 is the electron's g-factor.</p>
  <p>5. Spin is a fundamental property of elementary particles — as fundamental as charge or mass — and underpins the Pauli Exclusion Principle and thus all of chemistry.</p>`
)}
