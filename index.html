${makeQ(1, "What is a linear vector space? List four axioms it must satisfy.", `<p>A linear vector space V is a set with addition and scalar multiplication satisfying: (1) Closure under addition: |u⟩+|v⟩ ∈ V; (2) Commutativity: |u⟩+|v⟩ = |v⟩+|u⟩; (3) Existence of zero vector: |0⟩ such that |v⟩+|0⟩ = |v⟩; (4) Closure under scalar multiplication: c|v⟩ ∈ V for any scalar c. In QM, scalars are complex numbers.</p>`)}
${makeQ(2, "What is a basis? What conditions must basis vectors satisfy?", `<p>A basis is a set of vectors that: (1) are linearly independent (no vector expressible as combination of others), and (2) span the space (any vector expressible as linear combination of basis vectors). In QM, we use orthonormal bases: ⟨eᵢ|eⱼ⟩ = δᵢⱼ. The number of basis vectors = dimension of the space.</p>`)}
${makeQ(3, "Write the completeness relation and explain its meaning.", `<div class="answer-formula">Σᵢ |eᵢ⟩⟨eᵢ| = 𝟙 (identity operator)</div><p>This says: inserting a complete set of states gives the identity. Any state can be expanded in this basis: |ψ⟩ = 𝟙|ψ⟩ = Σᵢ |eᵢ⟩⟨eᵢ|ψ⟩ = Σᵢ cᵢ|eᵢ⟩. The completeness relation is crucial for computing matrix elements and transition probabilities.</p>`)}
${makeQ(4, "What is the dimension of the vector space for a spin-½ particle? What are the basis states?", `<p>A spin-½ particle has a 2-dimensional Hilbert space (2 basis states). The standard orthonormal basis is:</p><div class="answer-formula">|↑⟩ = |+½⟩ (spin-up) and |↓⟩ = |−½⟩ (spin-down)</div><p>Any spin state is: |ψ⟩ = α|↑⟩ + β|↓⟩ where |α|² + |β|² = 1. This is the qubit in quantum computing.</p>`)}
<div class="topic-nav"><button class="btn-topic-nav next" onclick="loadContent('2-2')"><div class="nav-dir">NEXT</div><div class="nav-title">Hilbert Space & Inner Product →</div></button></div>
`;}

function makeStubContent(title, moduleLabel, keyFacts, formulas, qs, prevId, prevTitle, nextId, nextTitle) {
  let content = `<div class="content-title">${title}</div><div class="content-subtitle">${moduleLabel}</div>`;
  content += makeSection("Core Concepts", `<p>This topic is an essential part of the BAPHY106 curriculum. Study the definitions, mathematical results, and physical interpretations carefully.</p>`);
  content += makeKeyPoints(keyFacts);
  formulas.forEach(f => content += makeFormula(f[0], f[1]));
  content += `<hr class="section-divider"><div class="questions-header">Practice Questions <span>${qs.length} Qs</span></div>`;
  qs.forEach((q, i) => content += makeQ(i+1, q[0], q[1]));
  content += `<div class="topic-nav">`;
  if(prevId) content += `<button class="btn-topic-nav" onclick="loadContent('${prevId}')"><div class="nav-dir">PREV</div><div class="nav-title">← ${prevTitle}</div></button>`;
  if(nextId) content += `<button class="btn-topic-nav next" onclick="loadContent('${nextId}')"><div class="nav-dir">NEXT</div><div class="nav-title">${nextTitle} →</div></button>`;
  content += `</div>`;
  return content;
}

function content_2_2() { return makeStubContent("Hilbert Space & Inner Product","Module 2 · Mathematical Foundations",
  ["Hilbert space: complete inner product space — the mathematical arena of QM","Inner product ⟨ψ|φ⟩: complex number generalizing dot product","⟨ψ|φ⟩ = ⟨φ|ψ⟩* (conjugate symmetry)","⟨ψ|ψ⟩ ≥ 0 (positive definiteness); = 0 only if |ψ⟩ = 0","⟨ψ|φ⟩ is linear in |φ⟩ and anti-linear in |ψ⟩","Norm: ||ψ|| = √⟨ψ|ψ⟩ — must be finite for physical states"],
  [["Inner Product","⟨ψ|φ⟩ = ∫ ψ*(x) φ(x) dx  (continuous)\n⟨ψ|φ⟩ = Σᵢ ψᵢ* φᵢ         (discrete)"]],
  [["Define Hilbert space and state its key properties.","A Hilbert space ℋ is a complete inner product space over the complex numbers. Key properties: (1) It has an inner product ⟨·|·⟩ that is conjugate-symmetric, linear, and positive-definite. (2) It is complete — all Cauchy sequences converge within the space. (3) Physical quantum states are vectors in Hilbert space. (4) Observables are Hermitian operators on this space. (5) The Hilbert space can be finite- or infinite-dimensional."],
   ["What is the inner product? Write it explicitly for wave functions.","For quantum states represented as wave functions, the inner product is: <div class='answer-formula'>⟨ψ|φ⟩ = ∫₋∞^∞ ψ*(x) φ(x) dx</div>Properties: (1) ⟨ψ|φ⟩ = ⟨φ|ψ⟩*; (2) ⟨ψ|ψ⟩ ≥ 0 (= 0 only if |ψ⟩=0); (3) Linearity in second argument; (4) ⟨ψ|ψ⟩ = 1 for normalized states. The inner product measures the 'overlap' between states."],
   ["What is the Cauchy-Schwarz inequality in Hilbert space?","The Cauchy-Schwarz inequality states: |⟨ψ|φ⟩|² ≤ ⟨ψ|ψ⟩·⟨φ|φ⟩. This is fundamental in QM and is the mathematical basis of the Heisenberg Uncertainty Principle. For normalized states: |⟨ψ|φ⟩| ≤ 1, with equality when |ψ⟩ = e^(iθ)|φ⟩."],
   ["What does it mean for states to be orthogonal in Hilbert space?","Two states |ψ⟩ and |φ⟩ are orthogonal if ⟨ψ|φ⟩ = 0. Physically, orthogonal states represent mutually exclusive outcomes — measuring one gives zero probability for finding the system in the other. Example: ⟨↑|↓⟩ = 0 (spin-up and spin-down are orthogonal). A complete orthonormal basis {|eᵢ⟩} satisfies ⟨eᵢ|eⱼ⟩ = δᵢⱼ."]],
  "2-1","Linear Vector Space & Basis","2-3","Dirac Notation (Bra-Ket)");}

function content_2_3() { return makeStubContent("Dirac Notation (Bra-Ket)","Module 2 · Mathematical Foundations",
  ["Ket |ψ⟩: column vector representing quantum state","Bra ⟨ψ|: row vector (conjugate transpose of ket) — the dual","Inner product: ⟨φ|ψ⟩ — a complex number (c-number)","Outer product: |ψ⟩⟨φ| — an operator","Dirac notation unifies all quantum mechanical calculations cleanly","Measurement: probability of outcome aᵢ = |⟨aᵢ|ψ⟩|²"],
  [["Bra-Ket Summary","|ψ⟩ = ket (state vector)\n⟨ψ| = bra (dual vector)\n⟨φ|ψ⟩ = inner product (c-number)\n|ψ⟩⟨φ| = outer product (operator)\n⟨ψ|A|ψ⟩ = expectation value of operator A"]],
  [["What are bra and ket vectors? How are they related?","Dirac introduced ket |ψ⟩ as a column vector in Hilbert space representing a quantum state. The bra ⟨ψ| is its dual — the conjugate transpose (row vector). For a ket with components (c₁, c₂, ...), the bra has components (c₁*, c₂*, ...). The inner product ⟨φ|ψ⟩ is obtained by matrix-multiplying the bra ⟨φ| with the ket |ψ⟩: ⟨φ|ψ⟩ = Σᵢ φᵢ*ψᵢ (discrete) or ∫φ*(x)ψ(x)dx (continuous)."],
   ["What is the outer product and why is it an operator?","The outer product |ψ⟩⟨φ| maps a ket to another ket: (|ψ⟩⟨φ|)|χ⟩ = |ψ⟩⟨φ|χ⟩ = ⟨φ|χ⟩|ψ⟩. Since ⟨φ|χ⟩ is just a number, the result is a scalar multiple of |ψ⟩ — the outer product transforms vectors into vectors → it IS an operator. The projection operator Pᵢ = |eᵢ⟩⟨eᵢ| projects any state onto the basis vector |eᵢ⟩."],
   ["Write the expectation value of operator A using Dirac notation.","The expectation value of observable A in state |ψ⟩ is: <div class='answer-formula'>⟨A⟩ = ⟨ψ|A|ψ⟩ = ∫ ψ*(x) A ψ(x) dx</div>This is the quantum mechanical average of many measurements of A on identical systems in state |ψ⟩. For a Hermitian operator, ⟨A⟩ is always real."],
   ["What does |⟨aᵢ|ψ⟩|² represent physically?","⟨aᵢ|ψ⟩ is the inner product of eigenstate |aᵢ⟩ with state |ψ⟩. Its squared modulus |⟨aᵢ|ψ⟩|² gives the <strong>probability</strong> of obtaining eigenvalue aᵢ when measuring observable A on state |ψ⟩. This is the fundamental rule (Born rule) connecting quantum states to measurement outcomes."]],
  "2-2","Hilbert Space & Inner Product","2-4","Linear Operators & Matrix Algebra");}

function content_2_4() { return makeStubContent("Linear Operators & Matrix Algebra","Module 2 · Mathematical Foundations",
  ["A linear operator A maps kets to kets: A|ψ⟩ = |ψ'⟩","Linearity: A(α|ψ⟩+β|φ⟩) = αA|ψ⟩ + βA|φ⟩","Matrix element: Aᵢⱼ = ⟨eᵢ|A|eⱼ⟩","Identity operator 𝟙: 𝟙|ψ⟩ = |ψ⟩","Operator product AB ≠ BA in general — non-commutativity is key in QM","Trace: Tr(A) = Σᵢ Aᵢᵢ — invariant under basis change"],
  [["Matrix Representation","Aᵢⱼ = ⟨eᵢ|A|eⱼ⟩\n(AB)ᵢⱼ = Σₖ AᵢₖBₖⱼ  (matrix multiplication)\n(A†)ᵢⱼ = Aⱼᵢ*  (Hermitian conjugate)"]],
  [["What is a linear operator in quantum mechanics?","A linear operator A on Hilbert space maps kets to kets: A:|ψ⟩→A|ψ⟩, satisfying linearity: A(α|ψ⟩+β|φ⟩) = αA|ψ⟩+βA|φ⟩. In QM, all observables (energy, momentum, position) are represented by linear operators. In a chosen basis, operators are represented as matrices."],
   ["How is a matrix element computed? Write the expression.","The matrix element of operator A in the {|eᵢ⟩} basis is: <div class='answer-formula'>Aᵢⱼ = ⟨eᵢ|A|eⱼ⟩ = ∫ eᵢ*(x) A eⱼ(x) dx</div>The full matrix is then [A] with element in row i, column j equal to Aᵢⱼ. Once A is in matrix form, all QM calculations become matrix algebra."],
   ["What is the Hermitian conjugate (adjoint) A† of operator A?","The Hermitian conjugate A† is defined by ⟨ψ|A†|φ⟩ = ⟨φ|A|ψ⟩*. In matrix form: (A†)ᵢⱼ = Aⱼᵢ* — transpose then complex conjugate. Properties: (AB)† = B†A†, (A†)† = A. Physical observables must be Hermitian (A† = A), ensuring real eigenvalues."],
   ["Why does operator order matter in quantum mechanics?","For two operators A and B, in general AB ≠ BA. The commutator [A,B] = AB − BA ≠ 0 signals non-commutativity. Example: [x̂, p̂] = iℏ (position and momentum). Non-commutativity is the mathematical basis of the Heisenberg Uncertainty Principle — incompatible observables cannot simultaneously have definite values."]],
  "2-3","Dirac Notation","2-5","Hermitian, Unitary & Projection Operators");}

function content_2_5() { return makeStubContent("Hermitian, Unitary & Projection Operators","Module 2 · Mathematical Foundations",
  ["Hermitian (self-adjoint): A† = A → real eigenvalues → physical observables","Unitary: U†U = UU† = 𝟙 → preserves norms → describes time evolution & gates","Projection: P² = P = P† → projects onto a subspace","All quantum gates are unitary (reversible)",
   "Hermitian operators: position, momentum, energy, spin components"],
  [["Key Operator Types","Hermitian:    A† = A,   eigenvalues real\nUnitary:      U†U = 𝟙, preserves inner products\nProjection:   P² = P = P†, eigenvalues 0 or 1"]],
  [["What is a Hermitian operator? Why must observables be Hermitian?","A Hermitian operator satisfies A† = A (or equivalently, ⟨ψ|A|φ⟩ = ⟨φ|A|ψ⟩*). Properties: (1) Eigenvalues are always real — crucial since physical measurement outcomes must be real numbers. (2) Eigenvectors with different eigenvalues are orthogonal. (3) They form a complete orthonormal basis. Since measurements yield real numbers, observables must be Hermitian."],
   ["What is a unitary operator? Give examples.","A unitary operator U satisfies U†U = UU† = 𝟙. Properties: (1) Preserves inner products: ⟨Uψ|Uφ⟩ = ⟨ψ|φ⟩. (2) Preserves norms: ||U|ψ⟩|| = |||ψ⟩||. (3) Eigenvalues lie on the unit circle in complex plane. Examples: time evolution operator e^(−iHt/ℏ), quantum gate matrices (Hadamard, CNOT, Pauli gates). All quantum gates are unitary."],
   ["What is a projection operator? How is it constructed?","A projection operator P onto state |ψ⟩ is: P = |ψ⟩⟨ψ|. Properties: P² = P (idempotent), P† = P (Hermitian). Effect: P|φ⟩ = |ψ⟩⟨ψ|φ⟩ — projects |φ⟩ onto |ψ⟩. Eigenvalues: 1 (for states in the subspace) or 0 (orthogonal states). The measurement postulate: upon measuring observable A, the system projects onto the eigenstate corresponding to the measured eigenvalue."],
   ["Prove that eigenvalues of a Hermitian operator are real.","Let A|ψ⟩ = λ|ψ⟩ (|ψ⟩ ≠ 0). Taking inner product with ⟨ψ|: ⟨ψ|A|ψ⟩ = λ⟨ψ|ψ⟩. Since A is Hermitian: ⟨ψ|A|ψ⟩ = ⟨Aψ|ψ⟩ = (λ⟨ψ|ψ⟩)* = λ*⟨ψ|ψ⟩. So λ⟨ψ|ψ⟩ = λ*⟨ψ|ψ⟩ → λ = λ* (since ⟨ψ|ψ⟩ > 0) → λ is real. ∎"]],
  "2-4","Linear Operators & Matrix Algebra","2-6","Eigenvalues & Eigenvectors");}

function content_2_6() { return makeStubContent("Eigenvalues & Eigenvectors","Module 2 · Mathematical Foundations",
  ["A|ψ⟩ = λ|ψ⟩: |ψ⟩ is eigenvector, λ is eigenvalue","Eigenvalues of Hermitian operators: always real","Eigenvectors of Hermitian operators with different eigenvalues: orthogonal","Complete set: eigenvectors form a basis for the Hilbert space","Measurement postulate: measuring A yields eigenvalue λₙ with prob |⟨λₙ|ψ⟩|²","Degenerate: multiple eigenvectors sharing the same eigenvalue"],
  [["Eigenvalue Equation","A|ψₙ⟩ = λₙ|ψₙ⟩\nMatrix form: det(A − λI) = 0  (characteristic equation)"]],
  [["What is an eigenvalue equation in quantum mechanics?","The eigenvalue equation is A|ψₙ⟩ = λₙ|ψₙ⟩, where A is a linear operator (observable), |ψₙ⟩ is the eigenstate (eigenvector), and λₙ is the eigenvalue (the definite measurement outcome). When the system is in eigenstate |ψₙ⟩, measuring A always gives λₙ with certainty (probability = 1). For any other state, measurement gives random eigenvalues with probabilities |⟨ψₙ|ψ⟩|²."],
   ["How are eigenvalues found from the matrix representation?","Eigenvalues are solutions to the characteristic equation: det(A − λI) = 0. This polynomial in λ has degree n (for n×n matrix), giving n eigenvalues (counting multiplicity). For each eigenvalue λₙ, the eigenvector |ψₙ⟩ satisfies (A − λₙI)|ψₙ⟩ = 0. In QM, these are the Schrödinger equation solutions: Ĥ|Eₙ⟩ = Eₙ|Eₙ⟩."],
   ["What is degeneracy in quantum mechanics?","Degeneracy occurs when two or more linearly independent eigenstates share the same eigenvalue: A|ψₙᵃ⟩ = λₙ|ψₙᵃ⟩ and A|ψₙᵇ⟩ = λₙ|ψₙᵇ⟩ with |ψₙᵃ⟩ ≠ |ψₙᵇ⟩. Any linear combination α|ψₙᵃ⟩ + β|ψₙᵇ⟩ is also an eigenstate with the same eigenvalue. Physical example: in 3-D box, states (2,1,1), (1,2,1), (1,1,2) have the same energy → 3-fold degenerate."],
   ["State the spectral theorem for Hermitian operators.","The Spectral Theorem: Every Hermitian operator A has a complete set of orthonormal eigenstates {|aₙ⟩} with real eigenvalues {aₙ}. Any state in the Hilbert space can be expanded: |ψ⟩ = Σₙ cₙ|aₙ⟩, where cₙ = ⟨aₙ|ψ⟩. The operator can be written as A = Σₙ aₙ|aₙ⟩⟨aₙ| (spectral decomposition). This is why Hermitian operators are the mathematical representation of physical observables."]],
  "2-5","Hermitian, Unitary & Projection Operators","2-7","Pauli Matrices & Applications");}

function content_2_7() { return makeStubContent("Pauli Matrices & Applications","Module 2 · Mathematical Foundations",
  ["Three 2×2 Hermitian, unitary, traceless matrices representing spin-½","σ²ₓ = σ²ᵧ = σ²_z = 𝟙 (square of any Pauli matrix = identity)","Anti-commutation: {σᵢ, σⱼ} = 2δᵢⱼ𝟙","Commutation: [σᵢ, σⱼ] = 2iεᵢⱼₖσₖ","Pauli matrices → quantum gates (X, Y, Z gates in quantum computing)","Eigenvalues of all Pauli matrices: ±1"],
  [["Pauli Matrices","σₓ = [[0,1],[1,0]]    (X gate)\nσᵧ = [[0,−i],[i,0]]  (Y gate)\nσ_z = [[1,0],[0,−1]]  (Z gate)"]],
  [["Write the three Pauli matrices and state their properties.","The Pauli matrices are: σₓ = [[0,1],[1,0]], σᵧ = [[0,−i],[i,0]], σ_z = [[1,0],[0,−1]]. Properties: (1) Hermitian: σᵢ† = σᵢ; (2) Unitary: σᵢ†σᵢ = 𝟙; (3) Traceless: Tr(σᵢ) = 0; (4) σᵢ² = 𝟙; (5) Det(σᵢ) = −1; (6) Eigenvalues ±1."],
   ["Prove the commutation relation [σₓ, σᵧ] = 2iσ_z.","[σₓ,σᵧ] = σₓσᵧ − σᵧσₓ. Computing: σₓσᵧ = [[0,1],[1,0]][[0,−i],[i,0]] = [[i,0],[0,−i]] = iσ_z. σᵧσₓ = [[0,−i],[i,0]][[0,1],[1,0]] = [[−i,0],[0,i]] = −iσ_z. Therefore [σₓ,σᵧ] = iσ_z − (−iσ_z) = 2iσ_z. ∎ Generally: [σᵢ,σⱼ] = 2iεᵢⱼₖσₖ."],
   ["What are the eigenstates of σ_z and σₓ?","Eigenstates of σ_z: |↑⟩=[1,0] with eigenvalue +1; |↓⟩=[0,1] with eigenvalue −1. Eigenstates of σₓ: |+x⟩=(1/√2)[1,1] with eigenvalue +1; |−x⟩=(1/√2)[1,−1] with eigenvalue −1. Eigenstates of σᵧ: |+y⟩=(1/√2)[1,i] with eigenvalue +1; |−y⟩=(1/√2)[1,−i] with eigenvalue −1."],
   ["How are Pauli matrices used in quantum computing?","In quantum computing, Pauli matrices represent fundamental single-qubit gates: σₓ = X gate (bit flip: |0⟩↔|1⟩), σᵧ = Y gate (combined bit and phase flip), σ_z = Z gate (phase flip: |1⟩→−|1⟩). All single-qubit unitary gates can be expressed as U = e^(iθ(n̂·σ⃗)) — rotation on the Bloch sphere — using Pauli matrices. They form a complete basis for 2×2 Hermitian matrices."]],
  "2-6","Eigenvalues & Eigenvectors","2-8","Commutation Relations");}

function content_2_8() { return makeStubContent("Commutation Relations","Module 2 · Mathematical Foundations",
  ["Commutator [A,B] = AB − BA: zero if simultaneously measurable","[x̂, p̂] = iℏ — fundamental canonical commutation relation","[x̂, p̂] = iℏ is the algebraic source of Heisenberg Uncertainty Principle","If [A,B] = 0: A and B share eigenstates (simultaneously observable)","Angular momentum: [Lₓ,Lᵧ] = iℏL_z, [Lᵧ,L_z] = iℏLₓ, [L_z,Lₓ] = iℏLᵧ","[H,A] = 0 means A is conserved (constant of motion)"],
  [["Fundamental Commutation Relations","[x̂, p̂] = iℏ  (position-momentum)\n[Lᵢ, Lⱼ] = iℏεᵢⱼₖLₖ  (angular momentum)\n[σᵢ, σⱼ] = 2iεᵢⱼₖσₖ  (Pauli matrices)"]],
  [["What is a commutator? What does it mean for two operators to commute?","The commutator of operators A and B is [A,B] = AB − BA. If [A,B] = 0, A and B commute: they share a complete set of eigenstates and can be simultaneously measured with certainty (compatible observables). If [A,B] ≠ 0, they are incompatible (cannot be simultaneously measured precisely) — the source of the Uncertainty Principle."],
   ["State and explain the canonical commutation relation [x̂,p̂] = iℏ.","The position operator x̂ and momentum operator p̂ = −iℏ(∂/∂x) satisfy: [x̂,p̂]ψ = x(−iℏ∂ψ/∂x) − (−iℏ∂/∂x)(xψ) = −iℏx(∂ψ/∂x) + iℏ(ψ + x∂ψ/∂x) = iℏψ. So [x̂,p̂] = iℏ. This is the fundamental commutation relation of QM, encoding the non-commutativity that gives rise to: Δx·Δp ≥ ℏ/2."],
   ["If [A,B] = 0, what can you conclude about their measurement?","If [A,B] = 0: (1) A and B share simultaneous eigenstates |aₙ,bₘ⟩ with A|aₙ,bₘ⟩ = aₙ|aₙ,bₘ⟩ and B|aₙ,bₘ⟩ = bₘ|aₙ,bₘ⟩. (2) Measuring A does not disturb the value of B. (3) Both A and B can be simultaneously specified with zero uncertainty. Example: Ĥ and L² commute in spherically symmetric potentials → energy and total angular momentum can be simultaneously defined."],
   ["State the uncertainty relation derived from commutators.","For any two observables A and B: ΔA · ΔB ≥ ½|⟨[A,B]⟩|. This is the Robertson-Schrödinger uncertainty relation. Substituting [x̂,p̂] = iℏ: Δx·Δp ≥ ½|⟨iℏ⟩| = ℏ/2. For [Lₓ,Lᵧ] = iℏL_z: ΔLₓ·ΔLᵧ ≥ ℏ/2|⟨L_z⟩|. The Uncertainty Principle is thus a direct consequence of non-commutativity."]],
  "2-7","Pauli Matrices & Applications","3-1","State Vector Representation");}

/* --- MODULE 3 --- */
function content_3_1() { return makeStubContent("State Vector Representation","Module 3 · Postulates of QM",
  ["The quantum state |ψ⟩ contains ALL information about the system","State vectors live in Hilbert space; superposition is allowed","Superposition: |ψ⟩ = Σ cₙ|ψₙ⟩ — weighted sum of basis states","|cₙ|² = probability of finding system in state |ψₙ⟩","After measurement → state 'collapses' to the measured eigenstate (postulate)","Density matrix ρ = |ψ⟩⟨ψ| extends to mixed states"],
  [["State Vector & Superposition","|ψ⟩ = c₁|ψ₁⟩ + c₂|ψ₂⟩ + ... = Σₙ cₙ|ψₙ⟩\nNormalization: Σₙ |cₙ|² = 1\nProbability of outcome n: Pₙ = |cₙ|² = |⟨ψₙ|ψ⟩|²"]],
  [["What is a state vector? How is it related to the wave function?","A state vector |ψ⟩ is an abstract vector in Hilbert space that completely describes the quantum state of a system. In position representation, the components of |ψ⟩ in the continuous position basis are the wave function: ψ(x) = ⟨x|ψ⟩. The state vector is more general — it exists independently of any representation, while the wave function is its expression in position space."],
   ["Explain the superposition principle in quantum mechanics.","The superposition principle: if |ψ₁⟩ and |ψ₂⟩ are valid quantum states, then any linear combination |ψ⟩ = c₁|ψ₁⟩ + c₂|ψ₂⟩ is also a valid quantum state (for any complex c₁, c₂ with |c₁|² + |c₂|² = 1). This is fundamentally non-classical — a particle can be in multiple states simultaneously. Example: Schrödinger's cat, qubit in |0⟩ + |1⟩, or an electron in a superposition of two spin states."],
   ["What is state collapse (reduction of the wave packet)?","State collapse (or wave function collapse) is the postulate that upon measuring observable A on state |ψ⟩ = Σcₙ|aₙ⟩: (1) The result is one of the eigenvalues aₙ, with probability |cₙ|². (2) Immediately after measurement, the state 'collapses' to the corresponding eigenstate |aₙ⟩. Subsequent measurement of A immediately after gives the same result with certainty. This is the measurement postulate — the most controversial aspect of QM."],
   ["Why is superposition not observable for macroscopic objects?","Macroscopic objects interact with their environment through an enormous number of degrees of freedom. This environmental interaction causes decoherence — the superposition phases average to zero extremely rapidly (decoherence time << observational timescale). The object appears classical because quantum interference terms are destroyed. Only carefully isolated systems (qubits in quantum computers, atoms in traps) maintain quantum superposition long enough to be exploited."]],
  "2-8","Commutation Relations","3-2","Measurement Postulate & Observables");}

function content_3_2() { return makeStubContent("Measurement Postulate & Observables","Module 3 · Postulates of QM",
  ["Observable: physical measurable quantity → Hermitian operator in QM","Measurement postulate: measuring A on |ψ⟩ yields eigenvalue aₙ with prob |⟨aₙ|ψ⟩|²","After measurement → state collapses to |aₙ⟩","Incompatible observables (non-commuting): cannot simultaneously measure","Compatible observables (commuting): can simultaneously measure","Expectation value ⟨A⟩ = ⟨ψ|A|ψ⟩ = quantum average"],
  [["Measurement Postulate","If |ψ⟩ = Σₙ cₙ|aₙ⟩  and  A|aₙ⟩ = aₙ|aₙ⟩\nP(aₙ) = |cₙ|² = |⟨aₙ|ψ⟩|²  (probability of getting aₙ)\nAfter measurement: |ψ⟩ → |aₙ⟩  (state collapse)\n⟨A⟩ = Σₙ aₙ|cₙ|² = ⟨ψ|A|ψ⟩"]],
  [["State the measurement postulate of quantum mechanics.","The measurement postulate (Born Rule): If an observable A has eigenvalues {aₙ} with eigenstates {|aₙ⟩}, and the system is in state |ψ⟩ = Σcₙ|aₙ⟩, then: (1) The only possible measurement outcomes are eigenvalues aₙ. (2) Probability of outcome aₙ is P(aₙ) = |⟨aₙ|ψ⟩|² = |cₙ|². (3) After obtaining aₙ, the state collapses to |aₙ⟩. The expectation value ⟨A⟩ = Σₙ aₙ|cₙ|² = ⟨ψ|A|ψ⟩."],
   ["What is an observable in quantum mechanics?","An observable is any physical quantity that can be measured — position, momentum, energy, spin, etc. In QM, each observable corresponds to a Hermitian (self-adjoint) operator. The requirement of Hermiticity ensures: (1) All eigenvalues (measurement outcomes) are real numbers. (2) Eigenstates form a complete orthonormal basis. (3) Time evolution preserves the completeness."],
   ["What happens when you measure the same observable twice in rapid succession?","If you measure observable A and obtain result aₙ, the system collapses to eigenstate |aₙ⟩. If you immediately measure A again, the system is already in |aₙ⟩, and the only possible outcome is aₙ again (with probability 1). This is called the repeatability/reproducibility of quantum measurements. However, if you measure a different non-commuting observable B between the two A measurements, the first result is disturbed."],
   ["Explain compatible vs. incompatible observables.","Compatible observables: [A,B] = 0 → share eigenstates → both can be measured simultaneously with precision. Example: energy E and total angular momentum L² in a central potential. Incompatible observables: [A,B] ≠ 0 → no shared eigenstates → measuring one disturbs the other. Example: [x̂,p̂] = iℏ — position and momentum are incompatible. Measuring x precisely makes p maximally uncertain."]],
  "3-1","State Vector Representation","3-3","Expectation Values");}

function content_3_3() { return makeStubContent("Expectation Values","Module 3 · Postulates of QM",
  ["⟨A⟩: quantum mechanical average of observable A over many measurements","⟨A⟩ = ⟨ψ|A|ψ⟩ = ∫ψ*(x) A ψ(x) dx","⟨A⟩ is always real for Hermitian A","Uncertainty: (ΔA)² = ⟨A²⟩ − ⟨A⟩²","Ehrenfest theorem: expectation values follow classical equations of motion","⟨x⟩, ⟨p⟩ evolve like classical position and momentum"],
  [["Expectation Value & Uncertainty","⟨A⟩ = ⟨ψ|A|ψ⟩\n(ΔA)² = ⟨A²⟩ − ⟨A⟩²  (variance)\nΔA = √(⟨A²⟩ − ⟨A⟩²)  (standard deviation/uncertainty)"]],
  [["Define expectation value and write its formula.","The expectation value ⟨A⟩ of observable A in state |ψ⟩ is: <div class='answer-formula'>⟨A⟩ = ⟨ψ|A|ψ⟩ = ∫₋∞^∞ ψ*(x) A ψ(x) dx</div>It is the quantum mechanical average — if you prepare many identical systems in state |ψ⟩ and measure A on each, ⟨A⟩ is the average of all results. Note: ⟨A⟩ may not be an eigenvalue of A."],
   ["Define the uncertainty ΔA of an observable.","The uncertainty (standard deviation) of observable A in state |ψ⟩ is: <div class='answer-formula'>(ΔA)² = ⟨(A−⟨A⟩)²⟩ = ⟨A²⟩ − ⟨A⟩²</div>ΔA measures the spread of measurement results around the mean. ΔA = 0 iff the state is an eigenstate of A (definite outcome). The Heisenberg Uncertainty Principle: ΔxΔp ≥ ℏ/2 is expressed in terms of these uncertainties."],
   ["State Ehrenfest's theorem and its physical significance.","Ehrenfest's theorem: the expectation values of position and momentum obey classical equations of motion: d⟨x⟩/dt = ⟨p⟩/m and d⟨p⟩/dt = −⟨∂V/∂x⟩. This shows that the quantum mechanical center of the wave packet follows classical trajectory — quantum mechanics reproduces classical mechanics for expectation values. This bridges quantum and classical descriptions (Correspondence Principle in action)."],
   ["Calculate ⟨x⟩ and ⟨p⟩ for a free particle wave packet.","For a Gaussian wave packet ψ(x,0) = A·exp(−x²/4σ²)·exp(ik₀x): ⟨x⟩ = 0 (centered at origin, by symmetry). ⟨p⟩ = ℏk₀ (mean momentum from de Broglie). Uncertainty: Δx = σ, Δp = ℏ/2σ, giving ΔxΔp = ℏ/2 — the Gaussian packet is a minimum uncertainty state. As the packet evolves, ⟨x⟩(t) = ℏk₀t/m (moves with group velocity = classical velocity) demonstrating Ehrenfest's theorem."]],
  "3-2","Measurement Postulate & Observables","3-4","Schrödinger Wave Equation (Derivation)");}

function content_3_4() { return `
<div class="content-title">Schrödinger Wave Equation — Derivation</div>
<div class="content-subtitle">Module 3 · Postulates of Quantum Mechanics</div>
${makeSection("Overview", `<p>The Schrödinger equation is the central equation of non-relativistic quantum mechanics — analogous to Newton's F=ma for quantum systems. Erwin Schrödinger (1926) derived it by combining de Broglie's matter wave hypothesis with the classical wave equation. There are <strong>two forms</strong>: Time-Independent (TISE) and Time-Dependent (TDSE).</p>`)}
${makeSection("Assumptions for Derivation", `<p>Schrödinger's derivation rests on:</p>`)}
${makeKeyPoints([
  "de Broglie wavelength applies to matter waves: TE = PE + KE → E = V + p²/2m",
  "The wave function: Ψ = Ψ₀ e^(−iωt)",
  "The progressive wave equation in 3D: ∂²Ψ/∂x² + ∂²Ψ/∂y² + ∂²Ψ/∂z² = (1/u²)(∂²Ψ/∂t²)"
])}
${makeSection("Derivation of Time-Independent Schrödinger Equation", `<p><strong>Step 1:</strong> Start with total energy: E = V + p²/2m → p = √[2m(E−V)]</p>
<p><strong>Step 2:</strong> de Broglie: λ = h/p = h/√[2m(E−V)]</p>
<p><strong>Step 3:</strong> Wave function: Ψ = Ψ₀e^(−iωt). Differentiating twice w.r.t. t: ∂²Ψ/∂t² = −ω²Ψ</p>
<p><strong>Step 4:</strong> Substituting into the wave equation with u = νλ, ω = 2πν:</p>`)}
${makeFormula("Intermediate Steps", `∇²Ψ = −(ω²/u²)Ψ = −(4π²ν²/u²)Ψ = −(4π²/λ²)Ψ
Substituting λ = h/√[2m(E−V)]:
∇²Ψ = −(4π²/h²) × 2m(E−V) × Ψ`)}
${makeFormula("Time-Independent Schrödinger Equation (TISE)", `∇²Ψ + (8π²m/h²)(E−V)Ψ = 0
Or equivalently:
∇²Ψ + (2m/ℏ²)(E−V)Ψ = 0     [ℏ = h/2π]
Compact form: Ĥψ = Eψ  where Ĥ = −(ℏ²/2m)∇² + V`)}
${makeSection("Derivation of Time-Dependent Schrödinger Equation", `<p>Starting from TISE and Ψ = Ψ₀e^(−iωt). Differentiating: ∂Ψ/∂t = −iωΨ = −i(2πν)Ψ. Using E = hν: ∂Ψ/∂t = −(i2πE/h)Ψ = −(iE/ℏ)Ψ. Therefore <strong>EΨ = iℏ(∂Ψ/∂t)</strong>.</p>
<p>Substituting into TISE:</p>`)}
${makeFormula("Time-Dependent Schrödinger Equation (TDSE)", `−(ℏ²/2m)∇²Ψ + VΨ = iℏ(∂Ψ/∂t)
Or: ĤΨ = iℏ(∂Ψ/∂t)
This is the most general form — governs all quantum dynamics.`)}
<hr class="section-divider">
<div class="questions-header">Practice Questions <span>6 Qs</span></div>
${makeQ(1, "State the time-independent Schrödinger equation and identify each term.",
  `<div class="answer-formula">∇²Ψ + (2m/ℏ²)(E−V)Ψ = 0  or  Ĥψ = Eψ</div>
  <p><strong>∇²</strong>: Laplacian operator = ∂²/∂x² + ∂²/∂y² + ∂²/∂z² (spatial second derivatives)</p>
  <p><strong>Ψ</strong>: wave function — depends on position only (time eliminated)</p>
  <p><strong>m</strong>: mass of the particle</p>
  <p><strong>ℏ</strong>: reduced Planck's constant = h/2π</p>
  <p><strong>E</strong>: total energy of the particle (eigenvalue)</p>
  <p><strong>V</strong>: potential energy (function of position)</p>
  <p><strong>Ĥ = −(ℏ²/2m)∇² + V</strong>: Hamiltonian operator (total energy operator)</p>`
)}
${makeQ(2, "What are the two forms of Schrödinger equation? When is each used?",
  `<p><strong>Time-Independent Schrödinger Equation (TISE):</strong> ∇²ψ + (2m/ℏ²)(E−V)ψ = 0. Used when V does not depend on time (stationary states). Solutions are energy eigenstates with definite energy E. Examples: particle in a box, harmonic oscillator, hydrogen atom.</p>
  <p><strong>Time-Dependent Schrödinger Equation (TDSE):</strong> −(ℏ²/2m)∇²Ψ + VΨ = iℏ(∂Ψ/∂t). The most general equation — governs all quantum dynamics, including time-varying potentials. The TISE is recovered by separating variables (Ψ = ψ(x)e^(−iEt/ℏ)) when V is time-independent.</p>`
)}
${makeQ(3, "Derive the relation EΨ = iℏ(∂Ψ/∂t).",
  `<p>The wave function has the form: Ψ = Ψ₀ e^(−iωt)</p>
  <p>Differentiating with respect to time:</p>
  <div class="answer-formula">∂Ψ/∂t = −iω · Ψ₀e^(−iωt) = −iωΨ</div>
  <p>Using Planck's relation E = hν = ℏω: ω = E/ℏ</p>
  <div class="answer-formula">∂Ψ/∂t = −i(E/ℏ)Ψ → EΨ = iℏ(∂Ψ/∂t)</div>
  <p>This allows replacing the energy E in the TISE with the operator iℏ(∂/∂t), yielding the TDSE.</p>`
)}
${makeQ(4, "What is the Hamiltonian operator Ĥ? Write its explicit form.",
  `<p>The Hamiltonian operator is the quantum mechanical operator corresponding to total energy:</p>
  <div class="answer-formula">Ĥ = KE operator + PE operator = −(ℏ²/2m)∇² + V(r)</div>
  <p>In 1D: Ĥ = −(ℏ²/2m)(∂²/∂x²) + V(x)</p>
  <p>In 3D: Ĥ = −(ℏ²/2m)(∂²/∂x² + ∂²/∂y² + ∂²/∂z²) + V(x,y,z)</p>
  <p>The TISE is the eigenvalue equation: Ĥψ = Eψ. The TDSE is: ĤΨ = iℏ(∂Ψ/∂t). The Hamiltonian is Hermitian, ensuring real energy eigenvalues.</p>`
)}
${makeQ(5, "What are the key assumptions in deriving the Schrödinger equation?",
  `<p>Schrödinger's derivation assumes:</p>
  <p>1. de Broglie's wavelength: λ = h/p applies to matter waves for any type of field.</p>
  <p>2. Total energy: E = V + p²/2m (non-relativistic).</p>
  <p>3. Wave function form: Ψ = Ψ₀e^(−iωt) — plane wave time dependence.</p>
  <p>4. Classical wave equation: ∇²Ψ = (1/u²)(∂²Ψ/∂t²) holds for matter waves.</p>
  <p>5. Wave velocity: u = νλ.</p>
  <p>Note: The Schrödinger equation cannot be strictly "derived" from classical physics — it is fundamentally a postulate of quantum mechanics, whose correctness is validated by its extraordinary agreement with experiment.</p>`
)}
${makeQ(6, "What is the physical significance of the Hamiltonian operator in quantum mechanics?",
  `<p>The Hamiltonian Ĥ = −(ℏ²/2m)∇² + V is the most important operator in quantum mechanics:</p>
  <p>1. <strong>Energy observable:</strong> Its eigenvalues are the allowed energies of the system. Ĥψₙ = Eₙψₙ.</p>
  <p>2. <strong>Time evolution generator:</strong> The TDSE ĤΨ = iℏ(∂Ψ/∂t) shows Ĥ generates time evolution: Ψ(t) = e^(−iĤt/ℏ)Ψ(0).</p>
  <p>3. <strong>Conservation:</strong> If [Ĥ,A] = 0, observable A is conserved in time.</p>
  <p>4. <strong>Structure of solutions:</strong> Stationary states Ψₙ(x,t) = ψₙ(x)e^(−iEₙt/ℏ) are energy eigenstates with definite energy — they have time-independent probability densities |Ψ|².</p>`
)}

  <button class="btn-topic-nav next" onclick="loadContent('3-5')"><div class="nav-dir">NEXT</div><div class="nav-title">TISE →</div></button>
</div>`;}

function content_3_5() { return makeStubContent("Time-Independent Schrödinger Equation","Module 3 · Postulates of QM",
  ["∇²ψ + (2m/ℏ²)(E−V)ψ = 0  or  Ĥψ = Eψ","Applies to stationary states: time-independent V(r)","Solutions ψₙ(x) are energy eigenfunctions","Energy eigenvalues Eₙ are the allowed (quantized) energies","Stationary state: Ψ(x,t) = ψ(x)·e^(−iEt/ℏ) — time appears only as phase","For free particle (V=0): plane wave solutions"],
  [["TISE","−(ℏ²/2m)(d²ψ/dx²) + V(x)ψ = Eψ\nFor free particle (V=0):  d²ψ/dx² + k²ψ = 0,  k = √(2mE)/ℏ\nGeneral solution:  ψ(x) = A·sin(kx) + B·cos(kx)"]],
  [["Write and explain the time-independent Schrödinger equation.","The TISE: <div class='answer-formula'>−(ℏ²/2m)∇²ψ + Vψ = Eψ  →  Ĥψ = Eψ</div>It is an eigenvalue equation for the Hamiltonian Ĥ. Solutions ψₙ are eigenfunctions (stationary states) and Eₙ are eigenvalues (quantized energies). It applies when V is time-independent. The full time-dependent solution is Ψ(x,t) = ψ(x)e^(−iEt/ℏ) — only the phase oscillates in time, so |Ψ|² = |ψ|² is time-independent."],
   ["What is a stationary state? Why is |Ψ|² time-independent?","A stationary state is an energy eigenstate: Ψₙ(x,t) = ψₙ(x)e^(−iEₙt/ℏ). Its probability density: |Ψₙ|² = |ψₙ(x)|² · |e^(−iEₙt/ℏ)|² = |ψₙ(x)|² — time-independent! This is why they are 'stationary' — the probability distribution doesn't evolve. However, a superposition of two stationary states is NOT stationary — it oscillates at the beat frequency (E₂−E₁)/ℏ."],
   ["Solve the TISE for a free particle (V=0). What are the solutions?","For V=0: d²ψ/dx² + k²ψ = 0, where k = √(2mE)/ℏ. General solutions: ψ(x) = A·e^(ikx) + B·e^(−ikx) (complex exponential form) or A·sin(kx) + B·cos(kx) (real form). These represent plane waves traveling in ±x directions. Unlike the box case, there are no boundary conditions → k (and hence E) can take any positive value → free particle energy is continuous (not quantized). Full solution: Ψ(x,t) = A·e^(i(kx−ωt)) with ω = E/ℏ."],
   ["What is the separation of variables technique for solving the TISE?","For time-independent V, write Ψ(x,t) = ψ(x)·f(t). Substituting into TDSE: iℏ(∂Ψ/∂t) = −(ℏ²/2m)(d²ψ/dx²)f + Vψf. Dividing by Ψ: iℏ(df/dt)/f = [−(ℏ²/2m)(d²ψ/dx²)/ψ + V] = E (separation constant = energy). This gives: f(t) = e^(−iEt/ℏ) and −(ℏ²/2m)(d²ψ/dx²) + Vψ = Eψ (TISE). The two equations are independent — only the TISE needs to be solved for each problem."]],
  "3-4","Schrödinger Wave Equation (Derivation)","3-6","Time-Dependent Schrödinger Equation");}

function content_3_6() { return makeStubContent("Time-Dependent Schrödinger Equation","Module 3 · Postulates of QM",
  ["ĤΨ = iℏ(∂Ψ/∂t) — governs all quantum dynamics","Valid for time-varying potentials too","EΨ = iℏ(∂Ψ/∂t) → energy operator is iℏ(∂/∂t)","Probability current J: ∂|Ψ|²/∂t + ∇·J = 0 (continuity equation)","Time evolution unitary: Ψ(t) = e^(−iĤt/ℏ)Ψ(0)","Superposition of stationary states → time-evolving probability"],
  [["TDSE","ĤΨ = iℏ(∂Ψ/∂t)\n−(ℏ²/2m)∇²Ψ + VΨ = iℏ(∂Ψ/∂t)\nEnergy operator: Ê = iℏ(∂/∂t)"]],
  [["State the time-dependent Schrödinger equation and identify all terms.","TDSE: −(ℏ²/2m)∇²Ψ + VΨ = iℏ(∂Ψ/∂t). Left side: Ĥ = −(ℏ²/2m)∇² + V is the Hamiltonian. Right side: iℏ(∂/∂t) is the energy operator. Ψ(x,y,z,t): full time-dependent wave function. Key features: (1) First order in time (unlike classical wave equation which is second order). (2) Complex — requires complex wave functions. (3) Linear — superposition holds."],
   ["How does a superposition of energy eigenstates evolve in time?","For Ψ(x,0) = Σₙ cₙψₙ(x), the time evolution is: Ψ(x,t) = Σₙ cₙψₙ(x)e^(−iEₙt/ℏ). The probability density |Ψ|² = |Σcₙψₙe^(−iEₙt/ℏ)|² contains cross terms that oscillate at beat frequencies (Eₘ−Eₙ)/ℏ. This time evolution is what describes quantum transitions, quantum beats, and Rabi oscillations."],
   ["Derive the energy operator from the TDSE.","From Ψ = Ψ₀e^(−iEt/ℏ): ∂Ψ/∂t = −(iE/ℏ)Ψ → iℏ(∂Ψ/∂t) = EΨ. Therefore the energy operator is Ê = iℏ(∂/∂t). Similarly, momentum operator: p̂ = −iℏ(∂/∂x), and position operator: x̂ = x. These operator correspondences (classical quantity → quantum operator) are how quantum mechanics is systematically constructed from classical physics."],
   ["What is the probability current J? State the continuity equation.","Probability current: J = (ℏ/2mi)(Ψ*∇Ψ − Ψ∇Ψ*). Continuity equation: ∂ρ/∂t + ∇·J = 0, where ρ = |Ψ|². This is conservation of probability — probability cannot be created or destroyed, only flows. The continuity equation follows directly from the TDSE and confirms that total probability ∫|Ψ|²dV remains 1 at all times (unitarity of quantum evolution)."]],
  "3-5","Time-Independent Schrödinger Equation","4-1","Particle in a 1-D Box");}

/* --- MODULE 4 --- */
function content_4_1() { return `
<div class="content-title">Particle in a 1-D Box (Infinite Potential Well)</div>
<div class="content-subtitle">Module 4 · Applications of Quantum Mechanics</div>
${makeSection("The Problem Setup", `<p>The particle in a 1-D box (or infinite potential well) is the simplest application of the Schrödinger equation. It models a particle of mass m moving freely between two impenetrable walls at x = 0 and x = a.</p>`)}
${makeFormula("Potential Energy", `V(x) = 0    for  0 < x < a   (inside box, free motion)
V(x) = ∞   for  x ≤ 0 or x ≥ a  (walls — particle cannot escape)`)}
${makeSection("Applying the Schrödinger Equation", `<p><strong>Inside the box (V=0):</strong> TISE becomes d²ψ/dx² + k²ψ = 0, where k² = 2mE/ℏ².
General solution: ψ(x) = A sin(kx) + B cos(kx).</p>
<p><strong>Boundary conditions:</strong> ψ(0) = 0 and ψ(a) = 0 (wave function vanishes at walls where V=∞).</p>
<p>At x=0: ψ(0) = B·cos(0) = B = 0 → <strong>B = 0</strong>.</p>
<p>At x=a: ψ(a) = A sin(ka) = 0. Since A ≠ 0, sin(ka) = 0 → ka = nπ → <strong>k = nπ/a</strong>, n = 1,2,3,...</p>`)}
${makeFormula("Wave Function (before normalization)", `ψ(x) = A·sin(nπx/a)`)}
${makeSection("Normalization", `<p>Apply ∫₀ᵃ |ψ|² dx = 1 to find A. Integrating A²sin²(nπx/a) from 0 to a using sin²θ = (1−cos2θ)/2 gives A²·a/2 = 1 → <strong>A = √(2/a)</strong>.</p>`)}
${makeFormula("Normalized Eigenfunction", `ψₙ(x) = √(2/a) · sin(nπx/a)   for 0 < x < a
n = 1, 2, 3, ... (quantum number)`)}
${makeFormula("Energy Eigenvalues (Quantized!)", `Eₙ = n²π²ℏ²/(2ma²) = n²h²/(8ma²)
E₁ = π²ℏ²/(2ma²)  (ground state energy)
E₂ = 4E₁,  E₃ = 9E₁,  E₄ = 16E₁, ...`)}
<hr class="section-divider">
<div class="questions-header">Practice Questions <span>6 Qs</span></div>
${makeQ(1, "Set up and solve the Schrödinger equation for a particle in a 1-D box.",
  `<p>Inside the box (V=0): TISE → d²ψ/dx² + k²ψ = 0, k = √(2mE)/ℏ</p>
  <p>General solution: ψ = A·sin(kx) + B·cos(kx)</p>
  <p>BC1: ψ(0) = 0 → B = 0</p>
  <p>BC2: ψ(a) = 0 → A·sin(ka) = 0 → ka = nπ → k = nπ/a</p>
  <p>Wave function: ψₙ(x) = A·sin(nπx/a)</p>
  <p>Energy: k² = 2mEₙ/ℏ² = n²π²/a² → Eₙ = n²π²ℏ²/(2ma²) = n²h²/(8ma²)</p>
  <p>Normalization gives A = √(2/a). Final: ψₙ(x) = √(2/a)·sin(nπx/a)</p>`
)}
${makeQ(2, "Write the energy eigenvalues for a particle in a 1-D box. Show E₂ = 4E₁.",
  `<div class="answer-formula">Eₙ = n²π²ℏ²/(2ma²) = n²E₁</div>
  <p>E₁ = π²ℏ²/(2ma²) (ground state, n=1)</p>
  <p>E₂ = 4π²ℏ²/(2ma²) = 4E₁ (n=2)</p>
  <p>E₃ = 9E₁ (n=3), E₄ = 16E₁ (n=4)</p>
  <p>The energy levels scale as n², with increasing separation between consecutive levels. This discrete spectrum is a direct consequence of the boundary conditions — the quantum confinement.</p>`
)}
${makeQ(3, "Derive the normalization constant for the 1-D box.",
  `<p>Normalization condition: ∫₀ᵃ |ψₙ|² dx = 1</p>
  <div class="answer-formula">A² ∫₀ᵃ sin²(nπx/a) dx = 1</div>
  <p>Using sin²θ = (1 − cos2θ)/2:</p>
  <div class="answer-formula">A² ∫₀ᵃ (1 − cos(2nπx/a))/2 dx = A²[x/2 − sin(2nπx/a)/(4nπ/a)]₀ᵃ</div>
  <div class="answer-formula">= A² [a/2 − 0] = A²a/2 = 1 → A = √(2/a)</div>`
)}
${makeQ(4, "What is the quantum number n? What value can n NOT take and why?",
  `<p>The quantum number <strong>n = 1, 2, 3, 4, ...</strong> (positive integers only).</p>
  <p><strong>n cannot be 0</strong>: if n = 0, ψ₀(x) = √(2/a)·sin(0) = 0 everywhere — the wave function vanishes identically, meaning the particle doesn't exist. This is unphysical.</p>
  <p><strong>n cannot be negative</strong>: sin(−nπx/a) = −sin(nπx/a) gives the same |ψ|² as n > 0 — just an unphysical sign change, not a new physical state.</p>
  <p>The minimum allowed quantum number is n = 1, corresponding to the <strong>ground state energy E₁ > 0</strong> (zero-point energy).</p>`
)}
${makeQ(5, "An electron is confined to a box of length 2 Å. Calculate E₁.",
  `<p>Given: m = 9.11×10⁻³¹ kg, a = 2×10⁻¹⁰ m, n = 1</p>
  <div class="answer-formula">E₁ = π²ℏ²/(2ma²) = π²(1.055×10⁻³⁴)²/(2 × 9.11×10⁻³¹ × (2×10⁻¹⁰)²)</div>
  <div class="answer-formula">= (9.87 × 1.113×10⁻⁶⁸)/(7.29×10⁻⁵⁰) = 1.508×10⁻¹⁸ J = 9.42 eV</div>
  <p>This is on the order of atomic binding energies — consistent with electrons in atoms being "confined" to atomic-sized regions (~1 Å). The 1-D box is a reasonable first model for atomic systems.</p>`
)}
${makeQ(6, "How many nodes does ψₙ have? What is a node?",
  `<p>A <strong>node</strong> is a point inside the box (excluding the walls) where ψₙ(x) = 0. For ψₙ = √(2/a)·sin(nπx/a), the zeros occur at x = 0, a/n, 2a/n, ..., a — but the walls (x=0 and x=a) are excluded. Therefore: number of interior nodes = <strong>n−1</strong>.</p>
  <p>n=1 (ground state): 0 nodes. n=2: 1 node (at x=a/2). n=3: 2 nodes (at x=a/3 and 2a/3).</p>
  <p>Physical significance: more nodes → more oscillations → shorter de Broglie wavelength → higher momentum → higher kinetic energy. Thus nodes directly correlate with energy level.</p>`
)}

function content_4_2() { return makeStubContent("Eigenfunction & Energy Quantization","Module 4 · Applications",
  ["ψₙ(x) = √(2/a)·sin(nπx/a): the normalized eigenfunctions","Eₙ = n²h²/(8ma²): the discrete (quantized) energy eigenvalues","n = quantum number (positive integer, cannot be 0)","Energy spacing ΔE increases with n: levels spread further apart","As box size a→large: levels crowd together → approaches classical continuum","Energy quantization is a DIRECT consequence of boundary conditions"],
  [["Energy Levels","E₁ = h²/(8ma²)  (ground state)\nEₙ = n²E₁  (nth level)\nΔE(n→n+1) = (2n+1)E₁  (increases with n)"]],
  [["Explain why energy is quantized in the particle-in-box problem.","Energy quantization arises from the boundary conditions ψ(0) = ψ(a) = 0. These force sin(ka) = 0, restricting k to discrete values k = nπ/a. Since E = ℏ²k²/2m, only discrete energies Eₙ = n²π²ℏ²/(2ma²) are allowed. In classical physics, no boundary conditions apply to particle energy — any value is allowed. Quantum confinement = energy quantization: this is the fundamental connection."],
   ["What happens to energy levels as box size a increases?","As a increases: Eₙ = n²h²/(8ma²) → 0 for all n. The energy spacing ΔE = (2n+1)h²/(8ma²) → 0. Levels become infinitely dense, forming a continuous spectrum. This is the classical limit — for macroscopic boxes, energy appears continuous. Bohr's Correspondence Principle: in the limit of large quantum numbers or large systems, quantum results → classical results."],
   ["Explain the physical meaning of the quantum number n.","The quantum number n (= 1, 2, 3, ...) is the primary quantum number for the 1-D box. It determines: (1) Energy: Eₙ = n²E₁ — higher n means higher energy. (2) Number of nodes: n−1 interior zeros in ψₙ. (3) Wavelength: λₙ = 2a/n — the particle's de Broglie wavelength fits n half-waves in the box. (4) The minimum n=1 corresponds to the ground state (zero-point energy E₁ > 0)."],
   ["For n=1, where is the most probable location of the particle?","ψ₁(x) = √(2/a)·sin(πx/a). Probability density: |ψ₁|² = (2/a)·sin²(πx/a). Maximum when sin²(πx/a) = 1 → πx/a = π/2 → x = a/2. The most probable location is the <strong>center of the box</strong>. Compare: classically, the particle bounces back and forth uniformly → equal probability everywhere. The quantum ground state is most concentrated in the middle — a distinctly non-classical result."]],
  "4-1","Particle in a 1-D Box","4-3","Zero Point Energy & Probability Density");}

function content_4_3() { return makeStubContent("Zero Point Energy & Probability Density","Module 4 · Applications",
  ["Zero Point Energy (ZPE): minimum energy E₁ = π²ℏ²/(2ma²) > 0","ZPE is a consequence of Heisenberg Uncertainty Principle","Cannot have E=0 (that would require Δp=0 → Δx=∞ — particle not in box)","Probability density |ψₙ|² = (2/a)sin²(nπx/a)","For n=1: max probability at x=a/2 (center)","For n=2: zero probability at x=a/2 (node at center)","High n → uniform probability → classical limit (Correspondence Principle)"],
  [["ZPE & Probability","E_ZPE = E₁ = π²ℏ²/(2ma²)\n|ψₙ(x)|² = (2/a)sin²(nπx/a)\nFor large n: |ψₙ|² → 1/a (uniform, classical result)"]],
  [["What is Zero Point Energy? Why does it exist?","Zero Point Energy is the minimum non-zero energy E₁ = π²ℏ²/(2ma²) that a confined particle must possess, even at absolute zero temperature. It exists because: If E=0 then p=0 (Δp=0), but the Uncertainty Principle requires ΔxΔp ≥ ℏ/2. With Δx ≤ a (particle is in box), this forces Δp ≥ ℏ/2a > 0 — so the particle cannot have zero momentum → E > 0 always. ZPE is a purely quantum effect with no classical analog."],
   ["Describe the probability density for n=1 and n=2.", "For n=1: |ψ₁|² = (2/a)sin²(πx/a). Maximum at x=a/2 (center), zero at walls. For n=2: |ψ₂|² = (2/a)sin²(2πx/a). Two maxima at x=a/4 and 3a/4, ZERO at x=a/2 (node at center). Remarkable: at the n=2 energy level, the particle is NEVER found at the box center — even though classically it should pass through there. This is a uniquely quantum interference effect."],
   ["State and explain the Correspondence Principle for the 1-D box.","As n → ∞: |ψₙ|² = (2/a)sin²(nπx/a) oscillates so rapidly that its average over any finite region → 1/a (uniform). This means for large quantum numbers, the quantum probability distribution approaches the classical result of equal probability everywhere (bouncing back and forth). This is Bohr's Correspondence Principle: quantum mechanics → classical mechanics in the limit of large quantum numbers."],
   ["Explain why |ψ₂|² = 0 at x = a/2 — a quantum weirdness.", "At x=a/2 for n=2: ψ₂(a/2) = √(2/a)·sin(2π·(a/2)/a) = √(2/a)·sin(π) = 0. Therefore |ψ₂|² = 0. Classically, a particle bouncing between walls passes through x=a/2 — it should be found there 50% of the time. Quantum mechanically, in the n=2 eigenstate, there is ZERO probability of finding the particle at the center. This reflects the wave nature: the standing wave has a node at the center, meaning destructive interference eliminates the probability there."]],
  "4-2","Eigenfunction & Energy Quantization","4-4","Particle in a 3-D Box & Degeneracy");}

function content_4_4() { return makeStubContent("Particle in a 3-D Box & Degeneracy","Module 4 · Applications",
  ["3-D box: V=0 for 0<x<a, 0<y<b, 0<z<c","Separation of variables: ψ = X(x)Y(y)Z(z)","E = Eₓ + Eᵧ + E_z = (h²/8m)(nₓ²/a² + nᵧ²/b² + n_z²/c²)","For cubic box a=b=c: Eₙₓₙᵧₙ_z = (h²/8ma²)(nₓ² + nᵧ² + n_z²)","Degeneracy: different (nₓ,nᵧ,n_z) combinations with same E","(2,1,1),(1,2,1),(1,1,2) are 3-fold degenerate — same energy, different states"],
  [["3-D Box Energy","E = (h²/8m)(nₓ²/a² + nᵧ²/b² + n_z²/c²)\nFor cube (a=b=c): E = (n²h²/8ma²) where n² = nₓ²+nᵧ²+n_z²\nGround state: (1,1,1), E₁₁₁ = 3h²/(8ma²)"]],
  [["Set up the 3-D box problem and write the energy eigenvalues.","The TISE in 3D separates: X''(x)/X + Y''(y)/Y + Z''(z)/Z + 2mE/ℏ² = 0. Each part is independent: d²X/dx² + kₓ²X = 0, etc. Boundary conditions: X(0)=X(a)=0 → kₓ = nₓπ/a. Similarly for y and z. Energy: E = ℏ²(kₓ²+kᵧ²+k_z²)/2m = h²/(8m)(nₓ²/a²+nᵧ²/b²+n_z²/c²). Wave function: ψ = (2/a)^(3/2)·sin(nₓπx/a)·sin(nᵧπy/a)·sin(n_zπz/a) for a cube."],
   ["What is degeneracy? Give an example from the 3-D box.","Degeneracy: two or more distinct quantum states (different quantum numbers) with the same energy. For a cubic box: E = (h²/8ma²)(nₓ²+nᵧ²+n_z²). The triplet (2,1,1), (1,2,1), (1,1,2) all give nₓ²+nᵧ²+n_z² = 6, hence the same energy E = 6h²/(8ma²) = 6E₀. These three distinct wavefunctions represent 3-fold degeneracy. Physical consequence: any linear combination of degenerate eigenstates is also an eigenstate with the same energy."],
   ["What is the ground state energy of a 3-D cubic box?","Ground state: nₓ=nᵧ=n_z=1 (all quantum numbers minimum). E₁₁₁ = h²/(8ma²)(1+1+1) = 3h²/(8ma²) = 3E₁(1D). The 3D ground state energy is 3× the 1D ground state energy — reflecting zero-point energy contributions from all three spatial directions. This non-degeneracy of the ground state (only one way to achieve nₓ²+nᵧ²+n_z²=3) is general: ground states are non-degenerate (in simple potentials)."],
   ["How does degeneracy relate to symmetry?","Degeneracy is tied to symmetry: for a cubic box (a=b=c), the three quantum numbers (nₓ,nᵧ,n_z) can be permuted while preserving energy → 3-fold degeneracy. If the box is non-cubic (a≠b≠c), the symmetry is broken and the degeneracy is lifted — each (nₓ,nᵧ,n_z) gives a different energy. Generally, higher symmetry → more degeneracy. In atoms, spherical symmetry leads to 2l+1 degeneracy in the magnetic quantum number m_l."]],
  "4-3","Zero Point Energy & Probability Density","4-5","Quantum Tunneling");}

function content_4_5() { return makeStubContent("Quantum Tunneling","Module 4 · Applications",
  ["Particle passes through a potential barrier even with E < V₀ (classically impossible)","Tunneling probability T = e^(−2κL), κ = √(2m(V₀−E))/ℏ","T decreases exponentially with barrier width L and height (V₀−E)","Tunneling probability increases: smaller L, smaller (V₀−E), smaller mass m","No classical analog — purely quantum wave phenomenon","Applications: STM, nuclear fusion (solar), α-decay, tunnel diodes, quantum computing"],
  [["Tunneling Transmission Coefficient","T ≈ e^(−2κL)  (for thick barriers)\nκ = √(2m(V₀−E)) / ℏ\nT increases as: L↓, V₀↓, m↓ (lighter particles tunnel more)"]],
  [["Explain quantum tunneling. Why is it impossible classically?","Classical physics: a particle with kinetic energy E approaching a potential barrier of height V₀ > E is completely reflected (cannot enter the barrier). Quantum mechanics: the wave function does not abruptly go to zero at the barrier — it decays exponentially inside (Ψ ~ e^(−κx)) but emerges on the other side with small amplitude. The probability of finding the particle on the other side is T = |ψ_transmitted|²/|ψ_incident|² ≠ 0. This purely quantum effect has no classical explanation."],
   ["Write the tunneling transmission coefficient and state what it depends on.","T ≈ e^(−2κL) where κ = √(2m(V₀−E))/ℏ, L = barrier width. T depends on: (1) Barrier width L — exponential sensitivity. (2) Barrier height above E (V₀−E) — larger gap → smaller T. (3) Particle mass m — heavier particles tunnel exponentially less. Electrons tunnel efficiently; protons less so; macroscopic objects essentially never. This exponential sensitivity to L is exploited in STM for atomic-resolution imaging."],
   ["Give three real-world applications of quantum tunneling.","(1) Scanning Tunnelling Microscope (STM): tunneling current between tip and surface, exponentially sensitive to tip-surface distance → atomic resolution imaging. (2) Nuclear fusion in stars: protons at solar core temperature (~15 million K) don't classically have enough energy to overcome Coulomb barrier — quantum tunneling enables fusion, powering the Sun. (3) Alpha decay: alpha particle tunnels through nuclear potential barrier — Gamow's tunneling model explains α-decay lifetimes spanning 10⁻⁷ to 10¹⁷ seconds."],
   ["How does barrier width affect tunneling probability?","T ≈ e^(−2κL) shows exponential dependence on width L. Doubling L: T → T² (squared). For typical κ ~ 10¹⁰ m⁻¹ and L = 1 nm: T ~ e^(−20) ~ 2×10⁻⁹. For L = 0.5 nm: T ~ e^(−10) ~ 4.5×10⁻⁵ — 20,000× larger! In STM: every 0.1 nm increase in tip-surface distance reduces current by ~10× — this extreme sensitivity allows imaging of individual atoms."]],
  "4-4","Particle in a 3-D Box & Degeneracy","4-6","Scanning Tunnelling Microscope");}

function content_4_6() { return makeStubContent("Scanning Tunnelling Microscope (STM)","Module 4 · Applications",
  ["STM uses quantum tunneling to image surfaces at atomic resolution","Metal tip brought within ~0.5 nm of conducting surface","Tunneling current I ∝ e^(−2κd) — exponentially sensitive to distance d","Constant current mode: tip height adjusted to keep I constant → surface topography map","Constant height mode: tip scans at fixed height, current variations map surface","Resolution: ~0.1 nm lateral, ~0.01 nm vertical — sees individual atoms"],
  [["STM Working Principle","I_tunnel ∝ V_bias × e^(−2κd)\nκ = √(2mΦ)/ℏ  (Φ = work function of tip ~4–5 eV)\n10× current change per 0.1 nm distance change"],
   ["STM Resolution","Lateral resolution: ~0.1 nm (sub-Å)\nVertical resolution: ~0.01 nm\nFirst atomic image: IBM (1981, Binnig & Rohrer → Nobel 1986)"]],
  [["How does an STM work? Explain its principle of operation.","An STM uses a sharp metal tip (ideally terminated by a single atom) brought within ~0.5 nm of a conducting sample surface. A small bias voltage is applied. Electrons quantum tunnel across the vacuum gap between tip and surface, producing a measurable current I ∝ e^(−2κd). Since T is exponentially sensitive to distance d, even a 0.1 nm change alters I by ~10×. In constant-current mode, a feedback loop adjusts tip height to keep I constant — the recorded height variations directly map the surface atom positions."],
   ["What gives STM atomic resolution?","STM's atomic resolution comes from two factors: (1) The extreme exponential sensitivity of tunneling current to distance (10× per 0.1 nm) means the single foremost atom of the tip dominates the current — effectively creating an atomic-sized probe. (2) The tunneling current also depends on the local density of electronic states (LDOS) of the surface — allowing imaging of both atomic positions and electronic structure. Together, this gives ~0.1 nm lateral and ~0.01 nm vertical resolution."],
   ["What are the two operating modes of STM?","(1) Constant Current Mode: feedback circuit adjusts tip-sample distance in real-time to maintain constant tunneling current. The tip height variation directly maps the surface topography. More common — gives true topographic image. (2) Constant Height Mode: tip scans at fixed height; variations in tunneling current are recorded and mapped. Faster (no feedback lag) but risks tip-surface contact on rough surfaces. Used for fast imaging of flat samples."],
   ["Who invented the STM and when? What was its significance?","The STM was invented by Gerd Binnig and Heinrich Rohrer at IBM Zurich Research Laboratory in 1981. They received the Nobel Prize in Physics in 1986 (shared with Ernst Ruska, inventor of electron microscope). Significance: (1) First instrument to image individual atoms in real space. (2) Revolutionized surface science and nanotechnology. (3) Spawned the entire field of scanning probe microscopy (AFM, etc.). (4) Demonstrated a practical quantum effect for room-temperature technology."]],
  "4-5","Quantum Tunneling","5-1","Introduction & Classical vs Quantum Bits");}

/* --- MODULE 5 --- */
function content_5_1() { return makeStubContent("Introduction & Classical vs Quantum Bits","Module 5 · Quantum Computing",
  ["Classical bit: 0 or 1 (definite state)","Qubit: |ψ⟩ = α|0⟩ + β|1⟩ — superposition of 0 AND 1","|α|² + |β|² = 1 (normalization)","n qubits: 2ⁿ complex amplitudes simultaneously — exponential parallelism","Quantum advantage: certain problems (factoring, search) solved exponentially faster","Quantum decoherence: biggest practical challenge"],
  [["Qubit vs Classical Bit","Classical: bit ∈ {0, 1} (definite)\nQubit: |ψ⟩ = α|0⟩ + β|1⟩, |α|²+|β|²=1\nMeasurement → collapses to |0⟩ (prob |α|²) or |1⟩ (prob |β|²)\nn qubits: 2ⁿ amplitudes (vs 2ⁿ states for classical)"]],
  [["What is a qubit? How does it differ from a classical bit?","A classical bit is definitively either 0 or 1. A qubit (quantum bit) can be in a superposition: |ψ⟩ = α|0⟩ + β|1⟩, where α,β are complex numbers with |α|²+|β|²=1. Before measurement, the qubit is simultaneously '0 and 1.' Upon measurement: result is |0⟩ with probability |α|² or |1⟩ with probability |β|². The extra dimension (complex amplitudes) and superposition give quantum computers their power."],
   ["What is quantum parallelism?","n qubits can exist in a superposition of all 2ⁿ computational basis states simultaneously: |ψ⟩ = Σ cₓ|x⟩ over all n-bit strings x. Applying a quantum gate U to this superposition transforms all 2ⁿ states in ONE operation: U|ψ⟩ = Σ cₓ U|x⟩. This is quantum parallelism — equivalent to performing 2ⁿ classical computations simultaneously. However, measuring the result collapses to ONE outcome — the art of quantum algorithms is to design interference patterns that amplify the correct answer."],
   ["What makes quantum computers potentially faster than classical ones?","Quantum speedup comes from: (1) Superposition (quantum parallelism — exponentially many states). (2) Quantum interference — amplifying correct answers, canceling wrong ones. (3) Entanglement — correlations between qubits with no classical analog. Examples of speedups: Shor's algorithm (1994): factoring N-digit numbers in O(n³) vs classical O(e^(n^(1/3))) — exponential speedup. Grover's algorithm (1996): search unsorted database in O(√N) vs classical O(N) — quadratic speedup."],
   ["What is decoherence and why is it the main challenge?","Decoherence: quantum superpositions are destroyed by interactions with the environment. Even a single stray photon or vibration can collapse a qubit state, losing quantum information. Typical coherence times: superconducting qubits ~100 μs; trapped ions ~minutes. Classical operations take nanoseconds, but quantum operations must be completed within coherence time. Error correction codes require ~1000 physical qubits per 1 logical qubit. Maintaining coherence in large systems is the primary engineering challenge of quantum computing."]],
  "4-6","Scanning Tunnelling Microscope","5-2","Single Qubit & Bloch Sphere");}

function content_5_2() { return makeStubContent("Single Qubit & Bloch Sphere","Module 5 · Quantum Computing",
  ["Qubit: |ψ⟩ = cos(θ/2)|0⟩ + e^(iφ)sin(θ/2)|1⟩","Bloch sphere: unit sphere, every point = a pure qubit state","North pole: |0⟩, South pole: |1⟩, Equator: equal superpositions","θ: polar angle (0 to π), φ: azimuthal angle (0 to 2π)","Single-qubit gates = rotations of the Bloch sphere","Measurement collapses to north or south pole"],
  [["Bloch Sphere Parametrization","|ψ⟩ = cos(θ/2)|0⟩ + e^(iφ)sin(θ/2)|1⟩\nNorth pole (θ=0): |0⟩\nSouth pole (θ=π): |1⟩\nEquator (θ=π/2): |±⟩=(|0⟩±|1⟩)/√2, |±i⟩=(|0⟩±i|1⟩)/√2"]],
  [["What is the Bloch sphere? How does it represent a qubit?","The Bloch sphere is a unit sphere in 3D space where every point on the surface represents a pure qubit state. Parametrization: |ψ⟩ = cos(θ/2)|0⟩ + e^(iφ)sin(θ/2)|1⟩, with polar angle θ ∈ [0,π] and azimuthal angle φ ∈ [0,2π]. North pole: |0⟩. South pole: |1⟩. Equatorial plane: equal superpositions. This geometric picture makes single-qubit gate operations visual — each gate is a rotation of the Bloch sphere."],
   ["Where are |+⟩ and |−⟩ on the Bloch sphere?","|+⟩ = (|0⟩+|1⟩)/√2 and |−⟩ = (|0⟩−|1⟩)/√2 are the eigenstates of σₓ. On the Bloch sphere: θ=π/2 (equator), φ=0 for |+⟩ (positive x-axis) and φ=π for |−⟩ (negative x-axis). Similarly, |+i⟩ and |−i⟩ (σᵧ eigenstates) lie on the ±y axis of the equator. This correspondence: Bloch sphere axis ↔ Pauli matrix eigenstates."],
   ["Why can a qubit be represented on a sphere (not a circle)?","A general qubit is |ψ⟩ = α|0⟩+β|1⟩ with |α|²+|β|²=1, so (α,β) ∈ complex unit sphere S³. However, overall global phase e^(iγ) is unphysical (not measurable). This reduces the parameter space: after fixing global phase, one real freedom is θ (ratio |α|/|β|) and one is φ (relative phase between α and β). Two real parameters → 2D surface = Bloch sphere. The sphere captures all physically distinguishable single-qubit states."],
   ["How do single-qubit gates act on the Bloch sphere?","Every single-qubit unitary U acts as a rotation of the Bloch sphere. General form: U = e^(iα)Rₙ(θ) = e^(iα)e^(−iθ(n̂·σ⃗)/2), a rotation by angle θ about axis n̂. Examples: X gate (σₓ): 180° rotation about x-axis (bit flip |0⟩↔|1⟩). Z gate (σ_z): 180° rotation about z-axis (phase flip). H gate: 90° rotation about y-axis then 180° about x-axis. This geometric picture makes circuit design intuitive."]],
  "5-1","Introduction & Classical vs Quantum Bits","5-3","Two Qubits & Entanglement");}

function content_5_3() { return makeStubContent("Two Qubits & Entanglement","Module 5 · Quantum Computing",
  ["Two-qubit state: 4-dimensional Hilbert space, basis {|00⟩,|01⟩,|10⟩,|11⟩}","Product state: |ψ⟩ = |ψ_A⟩⊗|ψ_B⟩ — separable, no correlations","Entangled: NOT expressible as tensor product — non-classical correlations","Measurement on one qubit instantly affects the other (non-local)","Entanglement is a resource for quantum computing and communication","Bell states: maximally entangled two-qubit states"],
  [["Two-Qubit State Space","|ψ⟩ = c₀₀|00⟩ + c₀₁|01⟩ + c₁₀|10⟩ + c₁₁|11⟩\n|c₀₀|²+|c₀₁|²+|c₁₀|²+|c₁₁|² = 1\nProduct state: (α|0⟩+β|1⟩)⊗(γ|0⟩+δ|1⟩) = αγ|00⟩+αδ|01⟩+βγ|10⟩+βδ|11⟩"]],
  [["What is the tensor product of two qubit states?","For qubit A in |ψ_A⟩=α|0⟩+β|1⟩ and qubit B in |ψ_B⟩=γ|0⟩+δ|1⟩, the combined state is the tensor product: |ψ_A⟩⊗|ψ_B⟩ = αγ|00⟩+αδ|01⟩+βγ|10⟩+βδ|11⟩. This is a product (separable) state — the qubits are independent. The full 2-qubit Hilbert space is 4-dimensional. n qubits → 2ⁿ-dimensional Hilbert space."],
   ["Define entanglement. Give an example of an entangled state.","Two qubits are entangled if their joint state CANNOT be written as |ψ_A⟩⊗|ψ_B⟩. Example: |Φ+⟩ = (|00⟩+|11⟩)/√2. Suppose this were separable: (α|0⟩+β|1⟩)(γ|0⟩+δ|1⟩) = αγ|00⟩+αδ|01⟩+βγ|10⟩+βδ|11⟩. This requires αδ=0 AND βγ=0. But then either αγ=0 or βδ=0 — cannot have both |00⟩ and |11⟩ terms. Contradiction → state is entangled."],
   ["What are the physical consequences of entanglement?","If qubits A and B are in |Φ+⟩ = (|00⟩+|11⟩)/√2 and A is measured: with 50% probability A collapses to |0⟩, and B INSTANTLY collapses to |0⟩; or A→|1⟩ and B→|1⟩. The correlation is perfect, regardless of the distance between A and B. This non-local correlation has no classical explanation (proven by Bell's theorem). It enables: quantum teleportation, quantum cryptography (BB84), superdense coding, and quantum computation."],
   ["How is entanglement created experimentally?","Entanglement cannot be created by local operations on separate qubits — it requires a quantum gate that acts jointly on multiple qubits. The standard method: apply Hadamard (H) to qubit A (creating superposition), then CNOT with A as control, B as target: H|0⟩ = (|0⟩+|1⟩)/√2 → CNOT → (|00⟩+|11⟩)/√2 = |Φ+⟩ (Bell state). Physical implementations: parametric down-conversion (photons), two-qubit gates in superconducting or trapped-ion systems."]],
  "5-2","Single Qubit & Bloch Sphere","5-4","Bell States");}

function content_5_4() { return makeStubContent("Bell States","Module 5 · Quantum Computing",
  ["Four maximally entangled two-qubit states — form a complete orthonormal basis","|Φ+⟩ = (|00⟩+|11⟩)/√2, |Φ-⟩ = (|00⟩−|11⟩)/√2","|Ψ+⟩ = (|01⟩+|10⟩)/√2, |Ψ-⟩ = (|01⟩−|10⟩)/√2","Any two-qubit state can be expanded in Bell basis","Bell states are resource for quantum teleportation and superdense coding","Created by H gate + CNOT gate circuit"],
  [["Bell States","Φ+ = (|00⟩+|11⟩)/√2  ← standard entangled state\nΦ− = (|00⟩−|11⟩)/√2\nΨ+ = (|01⟩+|10⟩)/√2  ← spin-0 singlet analog\nΨ− = (|01⟩−|10⟩)/√2  ← spin singlet"]],
  [["Write all four Bell states. What makes them special?","The four Bell states are: |Φ±⟩=(|00⟩±|11⟩)/√2 and |Ψ±⟩=(|01⟩±|10⟩)/√2. They are special because: (1) Maximally entangled: each qubit is completely mixed (50/50) when measured alone. (2) Complete orthonormal basis for 2-qubit space: ⟨Φ+|Φ-⟩=0, ⟨Φ+|Ψ±⟩=0, etc. (3) Any 2-qubit state can be expanded in this basis. (4) They are related by simple Pauli operations on one qubit."],
   ["How is the Bell state |Φ+⟩ created from |00⟩?","Circuit: (1) Apply H to qubit A: |00⟩ → (|0⟩+|1⟩)/√2 ⊗ |0⟩ = (|00⟩+|10⟩)/√2. (2) Apply CNOT with A=control, B=target: |00⟩→|00⟩, |10⟩→|11⟩. Result: (|00⟩+|11⟩)/√2 = |Φ+⟩. This H+CNOT circuit is the universal Bell state generator. Starting from |01⟩, |10⟩, |11⟩ gives |Ψ+⟩, |Φ-⟩, |Ψ-⟩ respectively."],
   ["What is quantum teleportation? How do Bell states enable it?","Quantum teleportation transmits a qubit state |ψ⟩ = α|0⟩+β|1⟩ from Alice to Bob using: (1) A shared Bell pair |Φ+⟩ between Alice and Bob. (2) Alice performs Bell measurement on her qubit + the qubit to teleport → gets one of 4 results. (3) Alice sends 2 classical bits to Bob. (4) Bob applies corresponding Pauli correction (I, X, Z, or XZ) to his qubit → recovers |ψ⟩. The qubit state is teleported without sending the physical qubit. Note: no faster-than-light communication (classical bits still needed)."],
   ["Explain superdense coding using Bell states.","Superdense coding: Alice sends 2 classical bits using 1 qubit, by exploiting entanglement. (1) Alice and Bob share |Φ+⟩. (2) Alice encodes 2 bits by applying one of {I, X, Z, iY} to her qubit: 00→|Φ+⟩, 01→|Ψ+⟩, 10→|Φ-⟩, 11→|Ψ-⟩. (3) Alice sends her qubit to Bob. (4) Bob performs Bell measurement → identifies which of the 4 Bell states → recovers 2 bits. Two classical bits of information transmitted by sending one qubit — the entangled resource doubled the communication capacity."]],
  "5-3","Two Qubits & Entanglement","5-5","Single Qubit Gates");}

function content_5_5() { return makeStubContent("Single Qubit Gates (Pauli, Hadamard)","Module 5 · Quantum Computing",
  ["All single-qubit gates are 2×2 unitary matrices","X gate (NOT): |0⟩↔|1⟩ (bit flip), matrix = σₓ","Y gate: |0⟩→i|1⟩, |1⟩→−i|0⟩, matrix = σᵧ","Z gate (phase flip): |0⟩→|0⟩, |1⟩→−|1⟩, matrix = σ_z","H gate (Hadamard): |0⟩→|+⟩, |1⟩→|−⟩ — creates superposition","H creates equal superposition: H|0⟩=(|0⟩+|1⟩)/√2 — essential for QC"],
  [["Gate Matrices","X = [[0,1],[1,0]]  (bit flip)\nZ = [[1,0],[0,−1]] (phase flip)\nH = (1/√2)[[1,1],[1,−1]] (Hadamard)\nY = [[0,−i],[i,0]]  (both flips)"]],
  [["Write the Pauli gates and describe their action on qubits.","X gate (Pauli-X, NOT gate): X|0⟩=|1⟩, X|1⟩=|0⟩. Matrix [[0,1],[1,0]]. Classical NOT. Y gate (Pauli-Y): Y|0⟩=i|1⟩, Y|1⟩=−i|0⟩. Matrix [[0,−i],[i,0]]. Both bit and phase flip. Z gate (Pauli-Z, phase flip): Z|0⟩=|0⟩, Z|1⟩=−|1⟩. Matrix [[1,0],[0,−1]]. Leaves |0⟩ unchanged, flips sign of |1⟩. All are self-inverse (X²=Y²=Z²=𝟙) and Hermitian."],
   ["Derive the Hadamard gate and show H|0⟩ and H|1⟩.","H = (1/√2)[[1,1],[1,−1]]. Action: H|0⟩ = (1/√2)(|0⟩+|1⟩) = |+⟩. H|1⟩ = (1/√2)(|0⟩−|1⟩) = |−⟩. H creates an equal superposition from |0⟩ or |1⟩. Properties: H† = H (Hermitian), H² = 𝟙 (self-inverse), HXH = Z, HZH = X. H is the single most important gate in quantum computing — it creates the superpositions that enable quantum parallelism."],
   ["Show that all Pauli gates are both Hermitian and unitary.","For X: X† = (X*)ᵀ = [[0,1],[1,0]]ᵀ = [[0,1],[1,0]] = X → Hermitian. X†X = X² = [[1,0],[0,1]] = 𝟙 → Unitary. Same argument holds for Y and Z (with appropriate complex conjugates). For H: H† = H (real, symmetric matrix — so Hermitian), H² = 𝟙 → Unitary. Being both Hermitian and unitary means: eigenvalues are ±1, and the gate is its own inverse."],
   ["What is the S gate and T gate?","S gate (phase gate): S = [[1,0],[0,i]] — applies 90° phase to |1⟩. S|0⟩=|0⟩, S|1⟩=i|1⟩. T gate (π/8 gate): T = [[1,0],[0,e^(iπ/4)]] — applies 45° phase to |1⟩. Significance: {H, T, CNOT} is a universal gate set — any quantum computation can be approximated to arbitrary accuracy using these three gates. S = T², Z = S² = T⁴. The T gate is essential for fault-tolerant quantum computing."]],

function content_5_6() { return makeStubContent("Two Qubit Gates & CNOT","Module 5 · Quantum Computing",

  [["Define the CNOT gate and write its truth table.","CNOT (Controlled-NOT): a two-qubit gate with control qubit c and target qubit t. Action: flip target iff control is |1⟩. Truth table: |00⟩→|00⟩, |01⟩→|01⟩, |10⟩→|11⟩, |11⟩→|10⟩. In shorthand: |c,t⟩→|c,t⊕c⟩ where ⊕ is XOR. CNOT is the quantum analog of classical XOR. It is the most important two-qubit gate and, together with single-qubit gates, forms a universal quantum gate set."],

/* ===================== STATE ===================== */
let studied = [];
try { studied = JSON.parse(localStorage.getItem('qm_studied') || '[]'); } catch(e) { studied = []; }
let currentTopicId = null;

function updateProgress() {
  const total = MODULES.reduce((sum, m) => sum + m.topics.length, 0);
  const pct = Math.round((studied.length / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
}

function toggleStudied() {
  if (!currentTopicId) return;
  const btn = document.getElementById('markBtn');
  if (studied.includes(currentTopicId)) {
    studied = studied.filter(id => id !== currentTopicId);
    btn.textContent = '✓ Mark studied';
    btn.classList.remove('marked');
  } else {
    studied.push(currentTopicId);
    btn.textContent = '✓ Studied!';
    btn.classList.add('marked');
  }
  try { localStorage.setItem('qm_studied', JSON.stringify(studied)); } catch(e) {}
  updateProgress();
  renderModuleGrid();
}

/* ===================== RENDER ===================== */
function renderModuleGrid() {
  const grid = document.getElementById('modulesGrid');
  grid.innerHTML = MODULES.map(mod => {
    const studiedCount = mod.topics.filter(t => studied.includes(t.id)).length;
    const topicsHTML = mod.topics.map(t => {
      const done = studied.includes(t.id);
      return `<li class="topic-item ${done?'studied':''}" onclick="loadContent('${t.id}')">
        <span class="topic-dot"></span>
        <span>${t.title}</span>
        <span class="topic-arrow">→</span>
      </li>`;
    }).join('');
    return `<div class="module-card" id="mod-${mod.id}" onclick="toggleModule(${mod.id}, event)">
      <div class="module-header">
        <span class="module-num">M0${mod.id}</span>
        <div class="module-info">
          <div class="module-title">${mod.title}</div>
          <div class="module-meta"><span>${mod.hours}</span><span>${studiedCount}/${mod.topics.length} done</span></div>
        </div>
        <svg class="module-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9,18 15,12 9,6"/></svg>
      </div>
      <div class="module-topics">
        <ul class="topic-list">${topicsHTML}</ul>
      </div>
    </div>`;
  }).join('');
}

function toggleModule(id, e) {
  if (e.target.closest('.topic-item')) return;
  const card = document.getElementById(`mod-${id}`);
  const isActive = card.classList.contains('active');
  document.querySelectorAll('.module-card.active').forEach(c => c.classList.remove('active'));
  if (!isActive) card.classList.add('active');
}

function findTopic(id) {
  for (const mod of MODULES) {
    const t = mod.topics.find(t => t.id === id);
    if (t) return {topic: t, mod};
  }
  return null;
}

function loadContent(topicId) {
  const found = findTopic(topicId);
  if (!found) return;
  const {topic, mod} = found;
  currentTopicId = topicId;

  document.getElementById('home-view').style.display = 'none';
  const panel = document.getElementById('content-panel');
  panel.classList.add('visible');

  document.getElementById('breadcrumb').innerHTML =
    `<span>M0${mod.id} ${mod.title}</span><span class="sep">›</span><span class="current">${topic.title}</span>`;

  const markBtn = document.getElementById('markBtn');
  if (studied.includes(topicId)) {
    markBtn.textContent = '✓ Studied!';
    markBtn.classList.add('marked');
  } else {
    markBtn.textContent = '✓ Mark studied';
    markBtn.classList.remove('marked');
  }

  document.getElementById('contentBody').innerHTML = topic.content();
  window.scrollTo({top: 0, behavior: 'smooth'});

  panel.className = '';
  void panel.offsetWidth;
  panel.className = 'visible';
}

function goHome() {
  currentTopicId = null;
  document.getElementById('home-view').style.display = 'block';
  document.getElementById('content-panel').classList.remove('visible');
  window.scrollTo({top: 0, behavior: 'smooth'});
  renderModuleGrid();
}

function toggleAnswer(btn) {
  const card = btn.closest('.question-card');
  const panel = card.querySelector('.answer-panel');
  const visible = panel.classList.contains('visible');
  panel.classList.toggle('visible', !visible);
  btn.textContent = visible ? '▶ Show Answer' : '▼ Hide Answer';
  btn.classList.toggle('revealed', !visible);
}

/* ===================== INIT ===================== */
renderModuleGrid();
updateProgress();
</script>
</body>
</html>
